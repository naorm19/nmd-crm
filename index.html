<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMD CRM - לוח בקרה</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c14;--surface:#0f1623;--surface2:#161f30;--surface3:#1e2a3e;
    --border:#1e2d45;--accent:#3b82f6;--accent2:#60a5fa;--green:#10b981;
    --yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; direction:rtl; }

  #login-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; }
  .login-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px 36px; width:360px; max-width:90vw; text-align:center; }
  .login-logo { font-size:22px; font-weight:800; margin-bottom:8px; }
  .login-logo span { color:var(--accent); }
  .login-sub { font-size:13px; color:var(--muted); margin-bottom:28px; }
  .login-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 16px; color:var(--text); font-size:16px; font-family:'Heebo',sans-serif; outline:none; text-align:center; letter-spacing:3px; margin-bottom:16px; transition:border-color 0.2s; }
  .login-input:focus { border-color:var(--accent); }
  .login-input.error { border-color:var(--red); }
  .login-btn { width:100%; background:var(--accent); color:white; border:none; padding:12px; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Heebo',sans-serif; transition:opacity 0.2s; }
  .login-btn:hover { opacity:0.85; }
  .login-error { font-size:12px; color:var(--red); margin-top:10px; min-height:18px; }

  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
  .logo { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
  .logo span { color:var(--accent); }
  .header-meta { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:16px; }
  .sync-btn { background:var(--surface2); color:var(--muted2); border:1px solid var(--border); padding:6px 14px; border-radius:6px; font-size:12px; font-family:'Heebo',sans-serif; cursor:pointer; font-weight:600; transition:opacity 0.2s; }
  .sync-btn:hover { opacity:0.85; }

  .tabs-wrapper { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; overflow-x:auto; white-space:nowrap; }
  .tabs { display:inline-flex; gap:4px; padding:8px 0; }
  .tab { padding:7px 16px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid transparent; transition:all 0.15s; color:var(--muted2); background:transparent; font-family:'Heebo',sans-serif; white-space:nowrap; }
  .tab:hover { background:var(--surface2); color:var(--text); }
  .tab.active { background:var(--accent); color:white; border-color:var(--accent); }

  .main { padding:24px; max-width:1400px; margin:0 auto; }

  .overview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .client-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
  .client-card::before { content:''; position:absolute; top:0; right:0; width:3px; height:100%; background:var(--accent); opacity:0; transition:opacity 0.2s; }
  .client-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(59,130,246,0.15); }
  .client-card:hover::before { opacity:1; }
  .client-name { font-size:16px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .platform-badges { display:flex; gap:6px; }
  .badge { font-size:10px; padding:2px 8px; border-radius:20px; font-weight:600; }
  .badge-meta { background:rgba(24,119,242,0.2); color:#60a5fa; }
  .badge-google { background:rgba(234,67,53,0.2); color:#f87171; }
  .client-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .stat-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .stat-value { font-size:20px; font-weight:700; }
  .stat-value.green { color:var(--green); }
  .stat-value.yellow { color:var(--yellow); }
  .stat-value.blue { color:var(--accent2); }
  .budget-bar-wrap { margin-top:14px; }
  .budget-bar-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:6px; }
  .budget-bar { height:4px; background:var(--surface3); border-radius:2px; overflow:hidden; }
  .budget-bar-fill { height:100%; border-radius:2px; background:var(--green); transition:width 0.5s ease; }
  .budget-bar-fill.warn { background:var(--yellow); }
  .budget-bar-fill.danger { background:var(--red); }

  .client-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .client-title { font-size:24px; font-weight:800; }

  .date-filter { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
  .df-btn { padding:7px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--surface2); color:var(--muted2); font-family:'Heebo',sans-serif; transition:all 0.15s; }
  .df-btn:hover { color:var(--text); border-color:var(--accent); }
  .df-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
  .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .kpi-label { font-size:12px; color:var(--muted); margin-bottom:8px; font-weight:500; }
  .kpi-val { font-size:28px; font-weight:800; line-height:1; margin-bottom:4px; }
  .kpi-sub { font-size:11px; color:var(--muted); }

  /* ── BUDGET CARDS ── */
  .budget-cards { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
  .budget-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .budget-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .budget-card-title { font-size:13px; font-weight:700; color:var(--muted2); }
  .edit-btn { background:transparent; border:1px solid var(--border); color:var(--muted2); padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; font-family:'Heebo',sans-serif; transition:all 0.15s; }
  .edit-btn:hover { border-color:var(--accent); color:var(--accent); }
  .budget-amount { font-size:24px; font-weight:800; color:var(--text); margin-bottom:8px; }
  .budget-edit-row { display:flex; gap:8px; margin-top:8px; }
  .budget-input { flex:1; background:var(--surface2); border:1px solid var(--accent); border-radius:6px; padding:8px 12px; color:var(--text); font-size:14px; font-family:'Heebo',sans-serif; outline:none; }
  .save-btn { background:var(--accent); color:white; border:none; padding:8px 14px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Heebo',sans-serif; }
  .save-btn:hover { opacity:0.85; }

  .section-title { font-size:14px; font-weight:700; color:var(--muted2); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:24px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead tr { background:var(--surface2); border-bottom:1px solid var(--border); }
  th { padding:12px 16px; text-align:right; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; }
  tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--surface2); }
  td { padding:12px 16px; color:var(--text); }
  .status-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-left:8px; }
  .status-dot.active { background:var(--green); }
  .status-dot.paused { background:var(--yellow); }

  .loading { text-align:center; padding:60px; color:var(--muted); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--green); color:white; padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600; transition:transform 0.3s; z-index:300; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">NMD <span>CRM</span></div>
    <div class="login-sub">לוח בקרה פרסום דיגיטלי</div>
    <input class="login-input" id="login-input" type="password" placeholder="סיסמה" onkeydown="if(event.key==='Enter') doLogin()" autofocus />
    <button class="login-btn" onclick="doLogin()">כניסה</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="header">
  <div class="logo">NMD <span>CRM</span></div>
  <div class="header-meta">
    <span id="last-sync">טוען...</span>
    <button class="sync-btn" onclick="init()">🔄 רענן</button>
  </div>
</div>

<div class="tabs-wrapper">
  <div class="tabs" id="tabs">
    <button class="tab active" onclick="showOverview()" id="tab-overview">📊 כל הלקוחות</button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><div>טוען נתונים...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://jjzvaqtqtfniuxjfyoyb.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqenZhcXRxdGZuaXV4amZ5b3liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTc0OTIsImV4cCI6MjA4ODYzMzQ5Mn0.ZwUnfYUPelnfvEcr_hlyh0ImiwXv__Cs2Y9V3Snl9c0';
const PASSWORD = 'NMD123';
const SESSION_KEY = 'nmd_auth';

function cur(client) { return client.currency === 'ILS' ? '₪' : '$'; }

function getDateRange(mode) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const today = fmt(now);
  if (mode === 'today')     return { from:today, to:today, label:'היום' };
  if (mode === 'yesterday') { const y=new Date(now); y.setDate(y.getDate()-1); const ys=fmt(y); return { from:ys, to:ys, label:'אתמול' }; }
  if (mode === '7d')        { const d=new Date(now); d.setDate(d.getDate()-6); return { from:fmt(d), to:today, label:'7 ימים' }; }
  if (mode === '30d')       { const d=new Date(now); d.setDate(d.getDate()-29); return { from:fmt(d), to:today, label:'30 ימים' }; }
  if (mode === 'month')     { const from=`${now.getFullYear()}-${pad(now.getMonth()+1)}-01`; return { from, to:today, label:'החודש' }; }
  return { from:today, to:today, label:'היום' };
}

let currentDateMode = 'today';
let currentClientId = null;

function doLogin() {
  const inp = document.getElementById('login-input');
  const err = document.getElementById('login-error');
  if (inp.value === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-screen').style.display = 'none';
    init();
  } else {
    inp.classList.add('error');
    err.textContent = 'סיסמה שגויה, נסה שוב';
    inp.value = '';
    setTimeout(() => { inp.classList.remove('error'); err.textContent = ''; }, 2000);
  }
}
if (sessionStorage.getItem(SESSION_KEY) === '1') document.getElementById('login-screen').style.display = 'none';

async function supaFetch(path, params='') {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}${params}`, {
    headers: { 'apikey':SUPA_KEY, 'Authorization':`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json' }
  });
  if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
  return res.json();
}

async function supaPatch(path, params='', body={}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}${params}`, {
    method: 'PATCH',
    headers: { 'apikey':SUPA_KEY, 'Authorization':`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=representation' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Supabase patch error: ${res.status}`);
  return res.json();
}

let clients = [], allInsights = [], campaigns = {};

async function loadData() {
  clients = await supaFetch('clients', '?is_active=eq.true&order=business_name');
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const d30 = new Date(now); d30.setDate(d30.getDate()-29);
  const from = `${d30.getFullYear()}-${pad(d30.getMonth()+1)}-${pad(d30.getDate())}`;
  allInsights = await supaFetch('daily_insights', `?date=gte.${from}&select=client_id,platform,spend,leads,conversions,clicks,date`);
  const campRows = await supaFetch('campaigns', `?select=id,client_id,campaign_name,platform,status,daily_budget`);
  campaigns = {};
  campRows.forEach(c => {
    if (!campaigns[c.client_id]) campaigns[c.client_id] = [];
    campaigns[c.client_id].push(c);
  });
  document.getElementById('last-sync').textContent = 'עודכן: ' + new Date().toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
}

function getInsightsForRange(clientId, from, to, platform=null) {
  return allInsights
    .filter(r => r.client_id===clientId && r.date>=from && r.date<=to && (!platform || r.platform===platform))
    .reduce((acc,r) => {
      acc.spend  += parseFloat(r.spend||0);
      acc.leads  += parseInt(r.leads||0) + parseInt(r.conversions||0);
      acc.clicks += parseInt(r.clicks||0);
      return acc;
    }, { spend:0, leads:0, clicks:0 });
}

// ── OVERVIEW ─────────────────────────────────────────────────
function showOverview() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-overview').classList.add('active');
  renderOverview();
}

function renderOverview() {
  const main = document.getElementById('main');
  if (!clients.length) { main.innerHTML = '<div class="empty">אין לקוחות במערכת</div>'; return; }
  const { from, to } = getDateRange('today');
  main.innerHTML = '<div class="overview-grid">' + clients.map(c => {
    const ins = getInsightsForRange(c.id, from, to);
    const budget = (c.monthly_budget_meta||0) + (c.monthly_budget_google||0);
    const pct = budget>0 ? Math.min(100,(ins.spend/budget*100)).toFixed(0) : 0;
    const barClass = pct>90?'danger':pct>70?'warn':'';
    const sym = cur(c);
    return `
      <div class="client-card" onclick="showClient(${c.id})">
        <div class="client-name">
          <span>${c.business_name}</span>
          <div class="platform-badges">
            ${c.meta_ad_account_id?'<span class="badge badge-meta">Meta</span>':''}
            ${c.google_customer_id?'<span class="badge badge-google">Google</span>':''}
          </div>
        </div>
        <div class="client-stats">
          <div class="stat-item"><div class="stat-label">הוצאה היום</div><div class="stat-value blue">${sym}${ins.spend.toFixed(0)}</div></div>
          <div class="stat-item"><div class="stat-label">לידים היום</div><div class="stat-value green">${ins.leads}</div></div>
          <div class="stat-item"><div class="stat-label">קמפיינים</div><div class="stat-value">${(campaigns[c.id]||[]).length}</div></div>
          <div class="stat-item"><div class="stat-label">CPL היום</div><div class="stat-value yellow">${ins.leads>0?sym+(ins.spend/ins.leads).toFixed(0):'-'}</div></div>
        </div>
        ${budget>0?`<div class="budget-bar-wrap"><div class="budget-bar-label"><span>ניצול תקציב</span><span>${pct}%</span></div><div class="budget-bar"><div class="budget-bar-fill ${barClass}" style="width:${pct}%"></div></div></div>`:''}
      </div>`;
  }).join('') + '</div>';
}

// ── CLIENT DETAIL ─────────────────────────────────────────────
function showClient(clientId, dateMode) {
  if (dateMode) currentDateMode = dateMode;
  currentClientId = clientId;
  const c = clients.find(x => x.id === clientId);
  const { from, to, label } = getDateRange(currentDateMode);
  const sym = cur(c);

  // Combined KPIs
  const ins     = getInsightsForRange(c.id, from, to);
  const insMeta = getInsightsForRange(c.id, from, to, 'facebook');
  const insGoogle = getInsightsForRange(c.id, from, to, 'google');

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${clientId}`)?.classList.add('active');

  const cpl = ins.leads>0 ? sym+(ins.spend/ins.leads).toFixed(0) : '-';

  const dateButtons = [
    {mode:'today',label:'היום'},{mode:'yesterday',label:'אתמול'},
    {mode:'7d',label:'7 ימים'},{mode:'30d',label:'30 ימים'},{mode:'month',label:'החודש'}
  ].map(b => `<button class="df-btn ${currentDateMode===b.mode?'active':''}" onclick="showClient(${c.id},'${b.mode}')">${b.label}</button>`).join('');

  // Budget cards
  const budgetMeta   = c.monthly_budget_meta   || 0;
  const budgetGoogle = c.monthly_budget_google  || 0;

  const budgetSection = `
    <div class="budget-cards">
      ${c.meta_ad_account_id ? `
      <div class="budget-card">
        <div class="budget-card-header">
          <div class="budget-card-title">📘 תקציב חודשי Meta</div>
          <button class="edit-btn" onclick="toggleBudgetEdit('meta',${c.id},'${sym}')">✏️ עריכה</button>
        </div>
        <div class="budget-amount" id="budget-meta-val">${sym}${budgetMeta.toLocaleString()}</div>
        <div id="budget-meta-edit" style="display:none">
          <div class="budget-edit-row">
            <input class="budget-input" id="budget-meta-input" type="number" placeholder="הכנס תקציב" value="${budgetMeta}" />
            <button class="save-btn" onclick="saveBudget('meta',${c.id},'${sym}')">שמור</button>
          </div>
        </div>
        ${budgetMeta>0?`<div style="margin-top:10px">
          <div class="budget-bar-label"><span>ניצול</span><span>${Math.min(100,(insMeta.spend/budgetMeta*100)).toFixed(0)}%</span></div>
          <div class="budget-bar"><div class="budget-bar-fill ${insMeta.spend/budgetMeta>0.9?'danger':insMeta.spend/budgetMeta>0.7?'warn':''}" style="width:${Math.min(100,(insMeta.spend/budgetMeta*100)).toFixed(0)}%"></div></div>
        </div>`:''}
      </div>` : ''}
      ${c.google_customer_id ? `
      <div class="budget-card">
        <div class="budget-card-header">
          <div class="budget-card-title">🔴 תקציב חודשי Google</div>
          <button class="edit-btn" onclick="toggleBudgetEdit('google',${c.id},'${sym}')">✏️ עריכה</button>
        </div>
        <div class="budget-amount" id="budget-google-val">${sym}${budgetGoogle.toLocaleString()}</div>
        <div id="budget-google-edit" style="display:none">
          <div class="budget-edit-row">
            <input class="budget-input" id="budget-google-input" type="number" placeholder="הכנס תקציב" value="${budgetGoogle}" />
            <button class="save-btn" onclick="saveBudget('google',${c.id},'${sym}')">שמור</button>
          </div>
        </div>
        ${budgetGoogle>0?`<div style="margin-top:10px">
          <div class="budget-bar-label"><span>ניצול</span><span>${Math.min(100,(insGoogle.spend/budgetGoogle*100)).toFixed(0)}%</span></div>
          <div class="budget-bar"><div class="budget-bar-fill ${insGoogle.spend/budgetGoogle>0.9?'danger':insGoogle.spend/budgetGoogle>0.7?'warn':''}" style="width:${Math.min(100,(insGoogle.spend/budgetGoogle*100)).toFixed(0)}%"></div></div>
        </div>`:''}
      </div>` : ''}
    </div>`;

  // Camp tables
  const camps = campaigns[clientId] || [];
  const metaCamps   = camps.filter(x => x.platform === 'facebook');
  const googleCamps = camps.filter(x => x.platform === 'google');

  const campTable = (list) => {
    if (!list.length) return '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px">אין קמפיינים</td></tr>';
    return list.map(camp => {
      const sc = camp.status==='ENABLED'||camp.status==='ACTIVE'?'active':'paused';
      return `<tr><td><span class="status-dot ${sc}"></span>${camp.campaign_name||'-'}</td><td>${camp.status||'-'}</td><td>${camp.daily_budget?sym+parseFloat(camp.daily_budget).toFixed(0):'-'}</td></tr>`;
    }).join('');
  };

  document.getElementById('main').innerHTML = `
    <div class="client-header"><div class="client-title">${c.business_name}</div></div>
    <div class="date-filter">${dateButtons}</div>

    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">הוצאה כוללת</div><div class="kpi-val" style="color:var(--accent2)">${sym}${ins.spend.toFixed(0)}</div><div class="kpi-sub">${label}</div></div>
      <div class="kpi-card"><div class="kpi-label">לידים</div><div class="kpi-val" style="color:var(--green)">${ins.leads}</div><div class="kpi-sub">${label}</div></div>
      <div class="kpi-card"><div class="kpi-label">עלות לליד</div><div class="kpi-val" style="color:var(--yellow)">${cpl}</div><div class="kpi-sub">${label}</div></div>
      <div class="kpi-card"><div class="kpi-label">קליקים</div><div class="kpi-val">${ins.clicks}</div><div class="kpi-sub">${label}</div></div>
    </div>

    ${budgetSection}

    ${metaCamps.length ? `
    <div class="section-title">📘 קמפיינים Meta</div>
    <div class="table-wrap"><table>
      <thead><tr><th>שם קמפיין</th><th>סטטוס</th><th>תקציב יומי</th></tr></thead>
      <tbody>${campTable(metaCamps)}</tbody>
    </table></div>` : ''}

    ${googleCamps.length ? `
    <div class="section-title">🔴 קמפיינים Google</div>
    <div class="table-wrap"><table>
      <thead><tr><th>שם קמפיין</th><th>סטטוס</th><th>תקציב יומי</th></tr></thead>
      <tbody>${campTable(googleCamps)}</tbody>
    </table></div>` : ''}
  `;
}

// ── BUDGET EDIT ───────────────────────────────────────────────
function toggleBudgetEdit(platform, clientId, sym) {
  const editDiv = document.getElementById(`budget-${platform}-edit`);
  editDiv.style.display = editDiv.style.display === 'none' ? 'block' : 'none';
}

async function saveBudget(platform, clientId, sym) {
  const val = parseFloat(document.getElementById(`budget-${platform}-input`).value);
  if (isNaN(val) || val < 0) { showToast('סכום לא תקין', 'red'); return; }

  const field = platform === 'meta' ? 'monthly_budget_meta' : 'monthly_budget_google';
  try {
    await supaPatch('clients', `?id=eq.${clientId}`, { [field]: val });
    // Update local data
    const c = clients.find(x => x.id === clientId);
    c[field] = val;
    document.getElementById(`budget-${platform}-val`).textContent = sym + val.toLocaleString();
    document.getElementById(`budget-${platform}-edit`).style.display = 'none';
    showToast('✅ תקציב עודכן בהצלחה');
  } catch(e) {
    showToast('❌ שגיאה בשמירה', 'red');
  }
}

// ── TABS ─────────────────────────────────────────────────────
function buildTabs() {
  document.getElementById('tabs').innerHTML =
    `<button class="tab active" onclick="showOverview()" id="tab-overview">📊 כל הלקוחות</button>` +
    clients.map(c => `<button class="tab" id="tab-${c.id}" onclick="showClient(${c.id})">${c.business_name}</button>`).join('');
}

function showToast(msg, color='green') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color==='red' ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function init() {
  document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div><div>טוען נתונים...</div></div>';
  try {
    await loadData();
    buildTabs();
    renderOverview();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="empty">❌ שגיאת חיבור: ${e.message}</div>`;
    console.error(e);
  }
}

if (sessionStorage.getItem(SESSION_KEY) === '1') init();
</script>
</body>
</html>
