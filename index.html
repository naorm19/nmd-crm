const ST_INTENT = {
  // Always keep — proven buyer signals
  keep_commercial: ['near me','in my area','around me','close to me','my area','nearby','near by','same day','same-day',' service',' services',' company',' companies','professional','contractor',' hire ',' book ',' schedule','appointment','call us','free quote','free estimate','emergency','urgent','asap','24/7','local '],
  keep_pain:       ['not drying','not dry','drying slow','takes too long','taking too long','clothes not','burning smell','smells like','overheating','won\'t start','not working','fire hazard','fire risk','clogged dryer','blocked vent','dryer fire'],
  keep_research:   ['how much does','how much is','what does','cost near','price near','reviews','rated','best rated','top rated','certified','licensed','insured','bonded'],
  // Negative — wrong intent
  neg_diy:         ['how to ','how do i','how do you','diy ','do it yourself','do yourself','can i ','myself','tutorial','step by step','step-by-step',' steps to','youtube','instructions',' guide to',' guide for'],
  neg_product:     [' kit',' brush',' tool ',' attachment',' equipment',' supplies',' supply',' parts','walmart','home depot','amazon','lowe\'s','lowes',' for drill','lint eater','lint brush',' whip ',' cleaner bottle',' spray '],
  neg_jobs:        [' job ',' jobs',' career','hiring','salary','technician job','employment',' resume',' opening',' position'],
  neg_meta:        ['coupon','groupon','promo code','discount code',' scam',' fraud',' complaint',' lawsuit',' bbb ','ripoff','rip off'],
};

function stIntentScore(term) {
  const t = term.toLowerCase();
  let score = 0;
  let reason = null;

  // Pain phrases = highest commercial intent (someone's dryer is broken NOW)
  if (ST_INTENT.keep_pain.some(p => t.includes(p)))       { score += 5; }
  // "near me / service / company / professional" = buyer
  if (ST_INTENT.keep_commercial.some(p => t.includes(p))) { score += 3; }
  // Research = probably a buyer doing due diligence
  if (ST_INTENT.keep_research.some(p => t.includes(p)))   { score += 2; }

  const diyHit  = ST_INTENT.neg_diy.find(p => t.includes(p));
  const prodHit = ST_INTENT.neg_product.find(p => t.includes(p));
  const jobHit  = ST_INTENT.neg_jobs.find(p => t.includes(p));
  const metaHit = ST_INTENT.neg_meta.find(p => t.includes(p));

  if (diyHit)  { score -= 5; reason = `DIY: "${diyHit.trim()}"`; }
  if (prodHit) { score -= 4; reason = `מוצר/ציוד: "${prodHit.trim()}"`; }
  if (jobHit)  { score -= 8; reason = `דרושים: "${jobHit.trim()}"`; }
  if (metaHit) { score -= 6; reason = `קופון/תלונה: "${metaHit.trim()}"`; }

  return { score, negReason: reason };
}

function stAnalyze(rows, profileKey) {
  const cfg = ST_PROFILES[profileKey] || ST_PROFILES.generic;

  // ── State abbreviations that are also common English words → skip to avoid false positives ──
  // "in my area" → IN, "near me" → ME, "or" conjunction → OR, etc.
  const WORD_STATES = new Set(['IN','OR','ME','DE','OK','HI','AL','MA','OH','CO','ID','MO','LA','PA','VA','MS','MD','SC','MT','WV','AR','WA','RI']);
  // All non-FL US states — used for out-of-area detection
  const nonFlStates = ['AK','AZ','CA','CT','GA','IL','IA','KS','KY','MI','MN','NE','NV','NH','NJ','NM','NY','NC','ND','SD','TN','TX','UT','VT','WI','WY'];

  // Dynamic CPA from account data
  const convRows = rows.filter(r => r.conversions > 0);
  const accountCpa = convRows.length >= 3
    ? convRows.reduce((s,r) => s + r.cost, 0) / convRows.reduce((s,r) => s + r.conversions, 0)
    : cfg.pain_cost;
  const painCost   = Math.max(accountCpa * 1.5, cfg.pain_cost);
  const painClicks = cfg.pain_clicks;

  const recs = [];

  for (const row of rows) {
    const t = row.term.toLowerCase();
    const isExact = (row.match_type || '').toUpperCase().includes('EXACT');

    // Rule 0: proven converter → never touch, regardless of cost
    if (row.conversions > 0) continue;

    const { score: intentScore, negReason } = stIntentScore(t);

    // Positive commercial intent → don't touch (even if no conversion yet)
    if (intentScore >= 3 && !isExact) continue;
    if (intentScore >= 1 && row.clicks < 5) continue; // not enough data on ambiguous terms

    let cat = null, mt = null, reason = null;

    // 1. Geographic analysis
    const serviceCities = cfg.service_cities || [];
    // If term contains a known service city → this is a valid local search, skip geo check
    const isOurArea = serviceCities.some(c => t.includes(c.toLowerCase()));

    if (!isOurArea) {
      // 1a. Blacklist — specific locations/phrases to always exclude
      for (const bl of cfg.blacklist) {
        if (t.includes(bl.toLowerCase())) { cat='geo'; mt='phrase'; reason=`גיאו: "${bl}"`; break; }
      }
      // 1b. Out-of-state — only when service_cities are defined (= geo-targeted account)
      //     State must appear at END of search term (prevents "IN" matching "in my area")
      if (!cat && serviceCities.length > 0) {
        const bad = nonFlStates.find(s => {
          if (WORD_STATES.has(s)) return false; // skip abbreviations that are common words
          return new RegExp(`(^|\\s)${s}\\s*$`, 'i').test(t);
        });
        if (bad) { cat='geo'; mt='phrase'; reason=`מדינה לא מורשית: ${bad}`; }
      }
    }

    // 2. Wrong intent (DIY / product / jobs / scam) — phrase match to catch all variants
    if (!cat && intentScore <= -4) {
      cat='diy'; mt='phrase'; reason=negReason || 'כוונה לא מסחרית';
    }

    // 3. High impressions / 0 clicks → hurts Quality Score
    if (!cat && row.impressions >= cfg.hi_impr && row.clicks === 0) {
      cat='hi_imp'; mt='exact'; reason=`${row.impressions.toLocaleString()} חשיפות, 0 הקלקות`;
    }

    // 4. Budget bleeder: non-exact only, need ≥2 clicks to have signal, use dynamic threshold
    if (!cat && !isExact && row.clicks >= 2 && row.conversions === 0) {
      const wordCount = row.term.trim().split(/\s+/).length;
      if (row.cost >= painCost || row.clicks >= painClicks) {
        cat='budget_bleeder';
        mt = wordCount >= 3 ? 'phrase' : 'exact'; // pattern → phrase; specific → exact
        reason=`$${row.cost.toFixed(2)}, ${row.clicks} הקלקות | CPA ממוצע: $${accountCpa.toFixed(0)}`;
      }
    }

    if (cat) {
      // ── Compute the specific negative keyword to add ──────────
      // For geo/diy/product/jobs: the triggering phrase (e.g. "daytona", "coupon")
      // For budget_bleeder/hi_imp: the full term (phrase or exact)
      let negKw = '';
      const quotedMatch = reason?.match(/"([^"]+)"/)?.[1]?.trim();
      if ((cat === 'geo' || cat === 'diy') && quotedMatch) {
        negKw = `"${quotedMatch}"`;
      } else if (cat === 'geo' && reason?.startsWith('מדינה לא מורשית:')) {
        // Extract city+state from end of term: "air duct cleaning kennesaw ga" → "kennesaw ga"
        const GEO_SERVICE_WORDS = new Set(['cleaning','service','company','near','duct','dryer','air','vent','repair','and','the','for','of','a','my']);
        const tWords = row.term.trim().split(/\s+/);
        const stateWord = tWords[tWords.length - 1] || '';
        const cityWord  = tWords[tWords.length - 2] || '';
        negKw = (cityWord && !GEO_SERVICE_WORDS.has(cityWord.toLowerCase()))
          ? `"${cityWord} ${stateWord}"`
          : `"${stateWord}"`;
      } else {
        negKw = mt === 'exact' ? `[${row.term}]` : `"${row.term}"`;
      }
      recs.push({ ...row, cat, mt, reason, intentScore, negKw });
    }
  }

  const pri = { budget_bleeder:4, geo:3, diy:2, hi_imp:1 };
  return recs.sort((a,b) => (pri[b.cat]-pri[a.cat]) || b.cost-a.cost);
}

function stCopyList(setKey) {
  const items = stLastSets[setKey];
  if (!items?.length) return;
  const lines = items.map(r => r.negKw || (r.mt === 'exact' ? `[${r.term}]` : `"${r.term}"`));
  navigator.clipboard.writeText(lines.join('\n'));
  showToast(`הועתק ${lines.length} ביטויים ✓`);
}
function stCopyTerms(setKey) {
  const items = stLastSets[setKey];
  if (!items?.length) return;
  const lines = items.map(r => r.term).filter(Boolean);
  navigator.clipboard.writeText(lines.join('\n'));
  showToast(`הועתק ${lines.length} ביטויי חיפוש ✓`);
}
function stCopyNegKws(setKey) {
  const items = stLastSets[setKey];
  if (!items?.length) return;
  const lines = items.map(r => r.negKw || (r.mt === 'exact' ? `[${r.term}]` : `"${r.term}"`)).filter(Boolean);
  navigator.clipboard.writeText(lines.join('\n'));
  showToast(`הועתק ${lines.length} ביטויים לשלילה ✓`);
}

function stApplyFilter(camp) {
  stRender(stRawRows, camp);
}

function stRenderResults(rows, profileKey) {
  stRender(rows, '__all__');
}

function stRender(allRows, activeCamp) {
  const content    = document.getElementById('st-content');
  if (!content) return;
  const profileKey = stCurrentProfile;
  const cfg        = ST_PROFILES[profileKey] || ST_PROFILES.generic;
  const campaigns  = [...new Set(allRows.map(r => r.campaign_name).filter(Boolean))].sort();
  const rows       = activeCamp === '__all__' ? allRows : allRows.filter(r => r.campaign_name === activeCamp);
  const showCamp   = activeCamp === '__all__';

  stCurrentCamp = activeCamp;
  const nd = t => !stDismissed.has(t); // helper: not dismissed

  const recs         = stAnalyze(rows, profileKey).filter(r => nd(r.term));
  const totalSpend   = rows.reduce((s,r) => s+r.cost, 0);
  const totalClicks  = rows.reduce((s,r) => s+r.clicks, 0);
  const totalConv    = rows.reduce((s,r) => s+r.conversions, 0);
  const totalImpr    = rows.reduce((s,r) => s+r.impressions, 0);
  const avgCtr       = totalImpr > 0 ? (totalClicks/totalImpr*100) : 0;
  const wastedSpend  = rows.filter(r => r.conversions===0 && !(r.match_type||'').toUpperCase().includes('EXACT')).reduce((s,r) => s+r.cost, 0);
  const converting   = rows.filter(r => r.conversions>0 && nd(r.term)).sort((a,b) => b.conversions-a.conversions);
  const clicksNoConv = rows.filter(r => r.clicks>0 && r.conversions===0 && r.cost>=100 && nd(r.term) && !(r.match_type||'').toUpperCase().includes('EXACT')).sort((a,b) => b.cost-a.cost);
  const lowCtr       = rows.filter(r => r.impressions>=20 && r.clicks===0 && nd(r.term)).sort((a,b) => b.impressions-a.impressions);
  stLastSets = { recs, converting, clicksNoConv, lowCtr };

  const catLabels = { budget_bleeder:'💸 בזבוז', geo:'📍 גיאו', diy:'🔧 DIY', hi_imp:'📉 Hi-Imp' };
  const catColors = { budget_bleeder:'#ef4444', geo:'#f59e0b', diy:'#8b5cf6', hi_imp:'#64748b' };

  function termTable(items, setKey, showCopy=true) {
    if (!items.length) return '<div class="ca-empty">אין ביטויים בקטגוריה זו</div>';
    const copyBtn   = showCopy ? `<button class="st-copy-btn" onclick="stCopyList('${setKey}')">📋 העתק הכל (${items.length})</button>` : '';
    const markBtn   = `<button class="st-copy-btn" style="background:rgba(16,185,129,0.12);color:#10b981;border-color:rgba(16,185,129,0.3)" onclick="stMarkSelected()">✓ סמן נבחרים כטופלו</button>`;
    const markAllBtn= `<button class="st-copy-btn" style="background:rgba(16,185,129,0.08);color:#6ee7b7;border-color:rgba(16,185,129,0.2)" onclick="stMarkAll('${setKey}')">✓✓ סמן הכל כטופלו</button>`;
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <span style="font-size:13px;color:var(--muted)">${items.length} ביטויים</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${copyBtn}${markBtn}${markAllBtn}</div>
      </div>
      <div style="overflow-x:auto"><table class="st-table">
        <thead><tr>
          <th style="width:28px"><input type="checkbox" style="cursor:pointer" onchange="document.querySelectorAll('.st-row-cb-${setKey}').forEach(c=>c.checked=this.checked)" title="בחר הכל"></th>
          <th><div style="display:flex;flex-direction:column;gap:4px"><button class="st-copy-btn" style="font-size:10px;padding:2px 8px;width:fit-content" onclick="stCopyTerms('${setKey}')">📋 העתק</button><span>ביטוי חיפוש</span></div></th>
          <th><div style="display:flex;flex-direction:column;gap:4px"><button class="st-copy-btn" style="font-size:10px;padding:2px 8px;width:fit-content" onclick="stCopyNegKws('${setKey}')">📋 העתק</button><span>➕ לשלול</span></div></th>
          ${showCamp?'<th>קמפיין</th>':''}<th>Match</th><th>חשיפות</th><th>הקלקות</th><th>עלות</th><th>המרות</th><th>סיבה</th>
        </tr></thead>
        <tbody>
          ${items.map(r => `<tr>
            <td><input type="checkbox" class="st-row-cb st-row-cb-${setKey}" data-term="${(r.term||'').replace(/"/g,'&quot;')}" style="cursor:pointer"></td>
            <td class="st-term">${r.term||''}</td>
            <td style="white-space:nowrap">${r.negKw ? `<code style="background:rgba(239,68,68,0.12);color:#f87171;border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer;border:1px solid rgba(239,68,68,0.25)" onclick="navigator.clipboard.writeText(${JSON.stringify(r.negKw||'').replace(/"/g,'&quot;')});showToast('הועתק ✓')" title="לחץ להעתקה">${r.negKw||''}</code>` : ''}</td>
            ${showCamp?`<td style="font-size:11px;color:var(--muted);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.campaign_name||''}</td>`:''}
            <td><span class="st-mt-badge">${(r.match_type||'').replace('_',' ').toLowerCase()}</span></td>
            <td>${(r.impressions||0).toLocaleString()}</td>
            <td>${r.clicks||0}</td>
            <td>$${(r.cost||0).toFixed(2)}</td>
            <td style="color:${r.conversions>0?'var(--green)':'var(--muted)'}">${(r.conversions||0).toFixed(0)}</td>
            <td>${r.cat?`<span class="st-cat-badge" style="background:${catColors[r.cat]}22;color:${catColors[r.cat]};margin-left:6px">${catLabels[r.cat]||r.cat}</span>`:''}<span style="font-size:10px;color:var(--muted)">${r.reason||''}</span></td>
          </tr>`).join('')}
        </tbody>
      </table></div>`;
  }

  const recsHtml = termTable(recs, 'recs', false);

  const dismissedCount = stDismissed.size;
  const dismissedNote  = dismissedCount > 0
    ? `<span style="font-size:11px;color:var(--muted);margin-right:8px">🗂 ${dismissedCount} טופלו</span><button class="st-copy-btn" style="font-size:10px;padding:3px 8px" onclick="stResetDismissed()">אפס</button>`
    : '';

  const tabs = [
    { id:'recs',       label:`🎯 המלצות לשלילה (${recs.length}) ${dismissedCount?'· '+dismissedCount+' טופלו':''}`, html: recsHtml },
    { id:'converting', label:`✅ ממירים (${converting.length})`,    html: termTable(converting,   'converting',  false) },
    { id:'waste',      label:`💸 בזבוז >$100 (${clicksNoConv.length})`, html: termTable(clicksNoConv, 'clicksNoConv',true)  },
    { id:'lowctr',     label:`📉 CTR נמוך 20+ חשיפות (${lowCtr.length})`, html: termTable(lowCtr, 'lowCtr', true) },
  ];

  content.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px">
      <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;flex-shrink:0">📁 קמפיין</span>
      <button class="st-camp-btn${activeCamp==='__all__'?' active':''}" onclick="stApplyFilter('__all__')">כל הקמפיינים <span class="st-camp-count">${allRows.length}</span></button>
      ${campaigns.map(c=>`<button class="st-camp-btn${activeCamp===c?' active':''}" onclick="stApplyFilter(${JSON.stringify(c).replace(/"/g,'&quot;')})">${c} <span class="st-camp-count">${allRows.filter(r=>r.campaign_name===c).length}</span></button>`).join('')}
    </div>
    <div class="kpi-grid" style="margin-bottom:16px">
      <div class="kpi-card"><div class="kpi-label">השקעה</div><div class="kpi-val">$${totalSpend.toFixed(0)}</div><div class="kpi-sub">${rows.length} ביטויים</div></div>
      <div class="kpi-card"><div class="kpi-label">CTR ממוצע</div><div class="kpi-val">${avgCtr.toFixed(1)}%</div><div class="kpi-sub">${totalClicks.toLocaleString()} הקלקות</div></div>
      <div class="kpi-card"><div class="kpi-label">המרות</div><div class="kpi-val" style="color:var(--green)">${totalConv.toFixed(0)}</div><div class="kpi-sub">מ-${converting.length} ביטויים</div></div>
      <div class="kpi-card"><div class="kpi-label">בזבוז (ללא המרה)</div><div class="kpi-val" style="color:var(--red)">$${wastedSpend.toFixed(0)}</div><div class="kpi-sub">${totalSpend>0?Math.round(wastedSpend/totalSpend*100):0}% מהתקציב</div></div>
      <div class="kpi-card"><div class="kpi-label">🚫 לשלילה</div><div class="kpi-val" style="color:var(--yellow)">${recs.length}</div><div class="kpi-sub">המלצות אוטומטיות</div></div>
      ${dismissedCount>0?`<div class="kpi-card" style="cursor:pointer" onclick="stResetDismissed()"><div class="kpi-label">✅ טופלו</div><div class="kpi-val" style="color:var(--green)">${dismissedCount}</div><div class="kpi-sub">לחץ לאיפוס</div></div>`:''}
    </div>
    <div class="st-subtabs">
      ${tabs.map((t,i) => `<button class="st-subtab${i===0?' active':''}" data-stab="${t.id}" onclick="stSwitchTab('${t.id}')">${t.label}</button>`).join('')}
    </div>
    <div>
      ${tabs.map((t,i) => `<div class="st-tabpanel${i===0?'':' hidden'}" id="st-panel-${t.id}">${t.html}</div>`).join('')}
    </div>`;
}

function stSwitchTab(id) {
  document.querySelectorAll('.st-subtab').forEach(b  => b.classList.toggle('active', b.dataset.stab===id));
  document.querySelectorAll('.st-tabpanel').forEach(p => p.classList.toggle('hidden', p.id !== `st-panel-${id}`));
}
</script>
</body>
</html>
