<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<style>
  :root {
    --bg:#080c14;--surface:#0f1623;--surface2:#161f30;--surface3:#1e2a3e;
    --border:#1e2d45;--accent:#3b82f6;--accent2:#60a5fa;--green:#10b981;
    --yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; direction:rtl; }
  #login-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; }
  .login-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px 36px; width:360px; max-width:90vw; text-align:center; }
  .login-logo { font-size:22px; font-weight:800; margin-bottom:8px; }
  .login-logo span { color:var(--accent); }
  .login-sub { font-size:13px; color:var(--muted); margin-bottom:28px; }
  .login-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 16px; color:var(--text); font-size:16px; font-family:'Heebo',sans-serif; outline:none; text-align:center; letter-spacing:3px; margin-bottom:16px; transition:border-color 0.2s; }
  .login-input:focus { border-color:var(--accent); }
  .login-input.error { border-color:var(--red); }
  .login-btn { width:100%; background:var(--accent); color:white; border:none; padding:12px; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Heebo',sans-serif; transition:opacity 0.2s; }
  .login-btn:hover { opacity:0.85; }
  .login-error { font-size:12px; color:var(--red); margin-top:10px; min-height:18px; }
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; cursor:default; user-select:none; }
  .logo-mark { width:36px; height:36px; flex-shrink:0; }
  .logo-text { display:flex; flex-direction:column; line-height:1.1; }
  .logo-text .t1 { font-size:15px; font-weight:900; color:#fff; letter-spacing:1px; }
  .logo-text .t2 { font-size:9px; font-weight:600; color:var(--muted2); letter-spacing:2.5px; text-transform:uppercase; }
  .header-meta { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:16px; }
  .sync-btn { background:var(--surface2); color:var(--muted2); border:1px solid var(--border); padding:6px 14px; border-radius:6px; font-size:12px; font-family:'Heebo',sans-serif; cursor:pointer; font-weight:600; transition:opacity 0.2s; }
  .sync-btn:hover { opacity:0.85; }
  .tabs-wrapper { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; overflow-x:auto; white-space:nowrap; }
  .tabs { display:inline-flex; gap:4px; padding:8px 0; }
  .tab { padding:7px 16px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid transparent; transition:all 0.15s; color:var(--muted2); background:transparent; font-family:'Heebo',sans-serif; white-space:nowrap; }
  .tab:hover { background:var(--surface2); color:var(--text); }
  .tab.active { background:var(--accent); color:white; border-color:var(--accent); }
  .main { padding:24px; max-width:1400px; margin:0 auto; }
  .overview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .client-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
  .client-card::before { content:''; position:absolute; top:0; right:0; width:3px; height:100%; background:var(--accent); opacity:0; transition:opacity 0.2s; }
  .client-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(59,130,246,0.15); }
  .client-card:hover::before { opacity:1; }
  .client-name { font-size:16px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .platform-badges { display:flex; gap:6px; }
  .badge { font-size:10px; padding:2px 8px; border-radius:20px; font-weight:600; }
  .badge-meta { background:rgba(24,119,242,0.2); color:#60a5fa; }
  .badge-google { background:rgba(234,67,53,0.2); color:#f87171; }
  .client-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .stat-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .stat-value { font-size:20px; font-weight:700; }
  .stat-value.green { color:var(--green); }
  .stat-value.yellow { color:var(--yellow); }
  .stat-value.blue { color:var(--accent2); }
  .budget-bar-wrap { margin-top:14px; }
  .budget-bar-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:6px; }
  .budget-bar { height:4px; background:var(--surface3); border-radius:2px; overflow:visible; position:relative; }
  .budget-bar-fill { height:100%; border-radius:2px; transition:width 0.5s ease; }
  .budget-bar-pace { position:absolute; top:-2px; width:2px; height:8px; background:var(--muted2); border-radius:1px; }
  .client-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0; position:sticky; top:60px; z-index:91; background:var(--bg); padding:12px 0; }
  .client-title { font-size:24px; font-weight:800; }
  /* ── Date Range Picker (CRM-style) ── */
  .drp-wrap { position:relative; display:inline-block; }
  .drp-trigger { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius:9px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:'Heebo',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .drp-trigger:hover, .drp-trigger.open { border-color:var(--accent); box-shadow:0 0 0 2px rgba(59,130,246,0.15); }
  .drp-trigger .chevron { font-size:10px; color:var(--muted); transition:transform 0.2s; margin-right:2px; }
  .drp-trigger.open .chevron { transform:rotate(180deg); }
  .drp-lbl { color:var(--accent2); font-weight:700; }
  .drp-panel { position:absolute; top:calc(100% + 8px); left:0; display:none; background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:0 24px 64px rgba(0,0,0,0.55); z-index:9999; overflow:hidden; min-width:520px; }
  .drp-panel.open { display:flex; }
  .drp-presets { display:flex; flex-direction:column; padding:10px 8px; min-width:188px; border-left:1px solid var(--border); gap:2px; }
  .drp-divider { height:1px; background:var(--border); margin:6px 4px; }
  .drp-preset { display:flex; align-items:center; gap:9px; width:100%; text-align:right; padding:9px 12px; border-radius:8px; border:none; background:transparent; color:var(--muted2); font-family:'Heebo',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.12s; }
  .drp-preset:hover { background:var(--surface2); color:var(--text); }
  .drp-preset.active { background:rgba(59,130,246,0.12); color:var(--accent2); font-weight:700; }
  .drp-preset .dot { width:6px; height:6px; border-radius:50%; background:var(--border); flex-shrink:0; }
  .drp-preset.active .dot { background:var(--accent2); }
  .drp-cal-section { padding:16px; display:flex; flex-direction:column; gap:12px; flex:1; }
  .drp-cal-section .cal-hint { font-size:12px; color:var(--muted); text-align:center; padding:8px 0; }
  .drp-confirm-row { display:flex; align-items:center; justify-content:space-between; padding-top:10px; border-top:1px solid var(--border); }
  .drp-range-display { font-size:12px; color:var(--muted2); font-weight:600; }
  .drp-confirm-btn { background:var(--accent); color:white; border:none; border-radius:8px; padding:8px 20px; font-family:'Heebo',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:opacity 0.15s; }
  .drp-confirm-btn:hover { opacity:0.88; }
  .drp-confirm-btn:disabled { opacity:0.35; cursor:default; }
  /* ── Flatpickr dark theme override ── */
  .flatpickr-calendar { background:var(--surface2,#161f30)!important; border:1px solid var(--border,#2a3a55)!important; border-radius:12px!important; box-shadow:0 20px 60px rgba(0,0,0,0.6)!important; font-family:'Heebo',sans-serif!important; direction:rtl; }
  .flatpickr-months { background:var(--surface3,#1e2a3e)!important; border-radius:12px 12px 0 0!important; }
  .flatpickr-month { color:#e2e8f0!important; fill:#e2e8f0!important; }
  .flatpickr-current-month { color:#e2e8f0!important; font-size:14px!important; font-weight:700!important; }
  .flatpickr-current-month .flatpickr-monthDropdown-months { background:var(--surface3,#1e2a3e)!important; color:#e2e8f0!important; }
  .flatpickr-current-month input.cur-year { color:#e2e8f0!important; }
  .flatpickr-prev-month, .flatpickr-next-month { color:#94a3b8!important; fill:#94a3b8!important; }
  .flatpickr-prev-month:hover, .flatpickr-next-month:hover { color:#e2e8f0!important; fill:#e2e8f0!important; }
  .flatpickr-weekdays { background:var(--surface2,#161f30)!important; }
  span.flatpickr-weekday { color:#64748b!important; font-weight:600!important; font-size:11px!important; }
  .flatpickr-day { color:#94a3b8!important; border-radius:6px!important; }
  .flatpickr-day:hover { background:var(--surface3,#1e2a3e)!important; color:#e2e8f0!important; }
  .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange { background:#3b82f6!important; border-color:#3b82f6!important; color:white!important; }
  .flatpickr-day.inRange { background:rgba(59,130,246,0.15)!important; border-color:transparent!important; color:#93c5fd!important; box-shadow:-5px 0 0 rgba(59,130,246,0.15), 5px 0 0 rgba(59,130,246,0.15)!important; }
  .flatpickr-day.today { border-color:#10b981!important; color:#10b981!important; font-weight:700!important; }
  .flatpickr-day.today:hover { background:#10b981!important; color:white!important; }
  .flatpickr-day.flatpickr-disabled { color:#334155!important; }
  .flatpickr-innerContainer { background:var(--surface2,#161f30)!important; }
  .flatpickr-rContainer { padding:4px 8px 8px!important; }
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
  .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .kpi-label { font-size:12px; color:var(--muted); margin-bottom:8px; font-weight:500; }
  .kpi-val { font-size:28px; font-weight:800; line-height:1; margin-bottom:4px; }
  .kpi-sub { font-size:11px; color:var(--muted); }
  .budget-section { margin-bottom:24px; }
  .budget-total-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
  .budget-total-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .budget-total-title { font-size:14px; font-weight:700; color:var(--muted2); text-transform:uppercase; letter-spacing:0.5px; }
  .budget-total-amount { font-size:32px; font-weight:800; }
  .budget-pace-info { font-size:12px; color:var(--muted); }
  .budget-pace-info span { font-weight:700; }
  .budget-status-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
  .budget-status-badge.ok { background:rgba(16,185,129,0.15); color:var(--green); }
  .budget-status-badge.warn { background:rgba(245,158,11,0.15); color:var(--yellow); }
  .budget-status-badge.over { background:rgba(239,68,68,0.15); color:var(--red); }
  .budget-status-badge.under { background:rgba(100,116,139,0.15); color:var(--muted2); }

  /* ── Budget Alert Overlay ── */
  #budget-alert-overlay {
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,0.75); backdrop-filter:blur(4px);
    align-items:center; justify-content:center;
  }
  #budget-alert-overlay.show { display:flex; }
  #budget-alert-box {
    background:#1a0a0a; border:2px solid #ef4444;
    border-radius:16px; padding:32px 36px; max-width:420px; width:90%;
    text-align:center; box-shadow:0 0 40px rgba(239,68,68,0.4);
    animation:alertPulse 0.5s ease;
  }
  @keyframes alertPulse {
    0%   { transform:scale(0.85); opacity:0; }
    60%  { transform:scale(1.04); }
    100% { transform:scale(1);    opacity:1; }
  }
  #budget-alert-icon { font-size:48px; margin-bottom:12px; }
  #budget-alert-title { font-size:20px; font-weight:800; color:#ef4444; margin-bottom:8px; font-family:'Heebo',sans-serif; }
  #budget-alert-client { font-size:14px; color:#94a3b8; margin-bottom:16px; font-family:'Heebo',sans-serif; }
  #budget-alert-lines { margin-bottom:24px; }
  #budget-alert-lines div { font-size:14px; font-weight:600; color:#f1f5f9; font-family:'Heebo',sans-serif; padding:6px 0; border-bottom:1px solid rgba(239,68,68,0.15); }
  #budget-alert-lines div:last-child { border:none; }
  #budget-alert-btn {
    background:#ef4444; color:#fff; border:none; border-radius:10px;
    padding:12px 32px; font-size:15px; font-weight:700; cursor:pointer;
    font-family:'Heebo',sans-serif; width:100%;
    transition:background 0.2s;
  }
  #budget-alert-btn:hover { background:#dc2626; }
  .budget-bar-thick { height:10px; background:var(--surface3); border-radius:5px; overflow:visible; position:relative; margin-top:8px; }
  .budget-bar-thick-fill { height:100%; border-radius:5px; transition:width 0.5s ease; }
  .budget-bar-thick-pace { position:absolute; top:-4px; width:3px; height:18px; background:white; border-radius:2px; opacity:0.6; }
  .budget-cards { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .budget-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .budget-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .budget-card-title { font-size:13px; font-weight:700; color:var(--muted2); }
  .edit-btn { background:transparent; border:1px solid var(--border); color:var(--muted2); padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; font-family:'Heebo',sans-serif; transition:all 0.15s; }
  .edit-btn:hover { border-color:var(--accent); color:var(--accent); }
  .budget-amount { font-size:22px; font-weight:800; margin-bottom:4px; }
  .budget-spent { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .budget-edit-row { display:flex; gap:8px; margin-top:8px; }
  .budget-input { flex:1; background:var(--surface2); border:1px solid var(--accent); border-radius:6px; padding:8px 12px; color:var(--text); font-size:14px; font-family:'Heebo',sans-serif; outline:none; }
  .save-btn { background:var(--accent); color:white; border:none; padding:8px 14px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Heebo',sans-serif; }
  .save-btn:hover { opacity:0.85; }
  .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:24px; }
  .chart-wrap { position:relative; height:280px; }
  .section-title { font-size:14px; font-weight:700; color:var(--muted2); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:24px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead tr { background:var(--surface2); border-bottom:1px solid var(--border); }
  th { padding:12px 16px; text-align:right; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; }
  tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--surface2); }
  td { padding:12px 16px; color:var(--text); vertical-align:middle; }
  .status-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-left:8px; }
  .status-dot.active { background:var(--green); }
  .status-dot.paused { background:var(--yellow); }
  .camp-budget-input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:5px 10px; color:var(--text); font-size:13px; font-family:'Heebo',sans-serif; outline:none; width:100px; transition:border-color 0.2s; }
  .camp-budget-input:focus { border-color:var(--accent); }
  .camp-save-btn { background:var(--accent); color:white; border:none; padding:5px 10px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Heebo',sans-serif; margin-right:4px; }
  .loading { text-align:center; padding:60px; color:var(--muted); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--green); color:white; padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600; transition:transform 0.3s; z-index:300; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  /* ── Clarity Chat Widget ── */
  .clarity-chat { background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-top:24px; overflow:hidden; }
  .clarity-chat-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; transition:background 0.15s; }
  .clarity-chat-header:hover { background:var(--surface2); }
  .clarity-chat-header h3 { font-size:14px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px; margin:0; }
  .clarity-chat-header .clarity-badge { font-size:10px; background:rgba(59,130,246,0.15); color:var(--accent2); border:1px solid rgba(59,130,246,0.3); padding:2px 8px; border-radius:20px; font-weight:600; }
  .clarity-chat-body { padding:20px; }
  .clarity-messages { max-height:420px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; margin-bottom:14px; scroll-behavior:smooth; }
  .clarity-msg { padding:12px 16px; border-radius:10px; font-size:13px; line-height:1.7; white-space:pre-wrap; }
  .clarity-msg.bot { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .clarity-msg.user { background:rgba(59,130,246,0.12); color:var(--accent2); border:1px solid rgba(59,130,246,0.2); align-self:flex-end; max-width:80%; }
  .clarity-msg.loading { color:var(--muted); font-style:italic; }
  .clarity-quick-btns { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .clarity-quick-btn { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:12px; color:var(--muted2); cursor:pointer; font-family:'Heebo',sans-serif; transition:all 0.15s; }
  .clarity-quick-btn:hover { border-color:var(--accent); color:var(--accent2); background:rgba(59,130,246,0.08); }
  .clarity-input-row { display:flex; gap:8px; }

function getMonthPace() {
  const now = new Date();
  return now.getDate() / new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
}

function getBudgetStatus(spent, budget) {
  if (!budget) return null;
  const diff = (spent/budget) - getMonthPace();
  if (diff > 0.1)  return { label:'חריגה', cls:'over' };
  if (diff > 0.05) return { label:'מעל קצב', cls:'warn' };
  if (diff < -0.1) return { label:'מתחת לקצב', cls:'under' };
  return { label:'בקצב', cls:'ok' };
}

function getDateRange(mode) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt    = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const fmtHeb = iso => { const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; };
  const today = fmt(now);
  if (mode==='today')     return { from:today, to:today, label:'היום' };
  if (mode==='yesterday') { const y=new Date(now); y.setDate(y.getDate()-1); const s=fmt(y); return { from:s, to:s, label:'אתמול' }; }
  if (mode==='7d')        { const d=new Date(now); d.setDate(d.getDate()-6); return { from:fmt(d), to:today, label:'7 ימים' }; }
  if (mode==='30d')       { const d=new Date(now); d.setDate(d.getDate()-29); return { from:fmt(d), to:today, label:'30 ימים' }; }
  if (mode==='month')     { return { from:`${now.getFullYear()}-${pad(now.getMonth()+1)}-01`, to:today, label:'החודש' }; }
  if (mode==='lastmonth') {
    const s = new Date(now.getFullYear(), now.getMonth()-1, 1);
    const e = new Date(now.getFullYear(), now.getMonth(), 0);
    return { from:fmt(s), to:fmt(e), label:'החודש שעבר' };
  }
  if (mode==='year') { const d=new Date(now); d.setFullYear(d.getFullYear()-1); return { from:fmt(d), to:today, label:'שנה אחרונה' }; }
  if (mode==='alltime') { return { from:'2024-01-01', to:today, label:'כל הזמן' }; }
  if (mode==='custom' && customFrom && customTo) { return { from:customFrom, to:customTo, label:`${fmtHeb(customFrom)} – ${fmtHeb(customTo)}` }; }
  return { from:today, to:today, label:'היום' };
}

function getMonthRange() {
  const now = new Date();

  return { from:`${now.getFullYear()}-${pad(now.getMonth()+1)}-01`, to:now.toISOString().split('T')[0] };

  else if (_drpFP) { _drpFP.destroy(); _drpFP = null; }
}

function selectDRPPreset(mode, clientId) {
  if (mode === 'custom') {
    const calSec = document.getElementById('drp-cal-' + clientId);
    if (!calSec) return;
    calSec.style.display = 'flex';
    document.querySelectorAll('#drp-panel-' + clientId + ' .drp-preset').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
    if (_drpFP) { _drpFP.destroy(); _drpFP = null; }
    const target = document.getElementById('drp-fp-' + clientId);
    if (!target) return;
    target.innerHTML = '';
    const dummy = document.createElement('div');
    target.appendChild(dummy);
    _drpFP = flatpickr(dummy, {
      mode:'range', inline:true, dateFormat:'Y-m-d', maxDate:'today',
      defaultDate: [customFrom||null, customTo||null].filter(Boolean),
      locale: FP_LOCALE,
      onChange(sel) {
        const disp = document.getElementById('drp-range-disp-' + clientId);
        const btn  = document.getElementById('drp-ok-' + clientId);
        if (sel.length === 2) {
          const f = d => d.toISOString().split('T')[0];
          const fmtD = iso => iso.split('-').reverse().join('/');
          if (disp) disp.textContent = fmtD(f(sel[0])) + ' – ' + fmtD(f(sel[1]));
          if (btn) btn.disabled = false;
          dummy._from = f(sel[0]); dummy._to = f(sel[1]);
        } else {
          if (btn) btn.disabled = true;
          if (disp) disp.textContent = 'בחר תאריך התחלה וסיום';
        }
      }
    });
    const btn = document.getElementById('drp-ok-' + clientId);
    if (btn) {
      btn.disabled = true;
      btn.onclick = () => {
        if (dummy._from && dummy._to) {
          customFrom = dummy._from; customTo = dummy._to;
          closeDRP(clientId);
          showClient(clientId, 'custom');
        }
      };
    }
    return;
  }
  closeDRP(clientId);
  showClient(clientId, mode);
}

function closeDRP(clientId) {
  const panel = document.getElementById('drp-panel-' + clientId);
  const btn   = document.getElementById('drp-btn-'   + clientId);
  if (panel) panel.classList.remove('open');
  if (btn)   btn.classList.remove('open');
  if (_drpFP) { _drpFP.destroy(); _drpFP = null; }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.drp-wrap')) {
    document.querySelectorAll('.drp-panel.open').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.drp-trigger.open').forEach(b => b.classList.remove('open'));
  }
});

async function supaFetch(path, params='') {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}${params}`, {
    headers: { 'apikey':SUPA_KEY, 'Authorization':`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json' }
  });
  if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
  return res.json();
}

async function supaPatch(path, params='', body={}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}${params}`, {
    method:'PATCH',
    headers: { 'apikey':SUPA_KEY, 'Authorization':`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=representation' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Patch error: ${res.status}`);
  return res.json();
}

let clients = [], allInsights = [], campaigns = {};

async function loadData() {
  const allClients = await supaFetch('clients', '?is_active=eq.true');
  const order = ['דני ספרים', 'אסיף', 'מקור השפע', 'The Ductors', 'בורקס אמא', 'שחר אהרוני', 'קאסה קליניק'];
  clients = [
    ...order.map(name => allClients.find(c => c.business_name === name)).filter(Boolean),
    ...allClients.filter(c => !order.includes(c.business_name))
  ];
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const d30 = new Date(now); d30.setDate(d30.getDate()-29);
  const from = `${d30.getFullYear()}-${pad(d30.getMonth()+1)}-${pad(d30.getDate())}`;
  allInsights = await supaFetch('daily_insights', `?date=gte.${from}&select=client_id,campaign_id,platform,spend,leads,conversions,clicks,conversion_value,date&limit=5000`);
  const campRows = await supaFetch('campaigns', `?select=id,client_id,campaign_name,platform,status,daily_budget,monthly_budget`);
  campaigns = {};
  campRows.forEach(c => {
    if (!campaigns[c.client_id]) campaigns[c.client_id] = [];
    campaigns[c.client_id].push(c);
  });
  document.getElementById('last-sync').textContent = 'עודכן: ' + new Date().toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
}

function getInsightsForRange(clientId, from, to, platform=null) {
  return allInsights
    .filter(r => r.client_id===clientId && r.date>=from && r.date<=to && (!platform||r.platform===platform))
    .reduce((acc,r) => {
      acc.spend            += parseFloat(r.spend||0);
      acc.leads            += parseInt(r.leads||0) + parseInt(r.conversions||0);
      acc.clicks           += parseInt(r.clicks||0);
      acc.conversion_value += parseFloat(r.conversion_value||0);
      return acc;
    }, { spend:0, leads:0, clicks:0, conversion_value:0 });
}

function getCampMonthSpend(campId) {
  const { from, to } = getMonthRange();
  return allInsights
    .filter(r => r.campaign_id===campId && r.date>=from && r.date<=to)
    .reduce((s,r) => s + parseFloat(r.spend||0), 0);
}

function getInsightsByDay(clientId, from, to) {
  const map = {};
  allInsights
    .filter(r => r.client_id===clientId && r.date>=from && r.date<=to)
    .forEach(r => {
      if (!map[r.date]) map[r.date] = { spend:0, leads:0, clicks:0, conversion_value:0, conversions:0 };
      map[r.date].spend            += parseFloat(r.spend||0);
      map[r.date].leads            += parseInt(r.leads||0) + parseInt(r.conversions||0);
      map[r.date].clicks           += parseInt(r.clicks||0);
      map[r.date].conversion_value += parseFloat(r.conversion_value||0);
      map[r.date].conversions      += parseInt(r.conversions||0);
    });
  return map;
}

function getMonthSpend(clientId, platform=null) {
  const { from, to } = getMonthRange();
  return getInsightsForRange(clientId, from, to, platform).spend;
}

function budgetBarHtml(spent, budget, thick=false) {
  if (!budget) return '';
  const pace    = getMonthPace();
  const utilPct = Math.min(100,(spent/budget*100));
  const pacePct = Math.min(100,pace*100);
  const status  = getBudgetStatus(spent,budget);
  const fillColor = status?.cls==='over'?'var(--red)':status?.cls==='warn'?'var(--yellow)':status?.cls==='under'?'var(--muted)':'var(--green)';
  if (thick) return `<div class="budget-bar-thick"><div class="budget-bar-thick-fill" style="width:${utilPct}%;background:${fillColor}"></div><div class="budget-bar-thick-pace" style="right:${100-pacePct}%"></div></div>`;
  return `<div class="budget-bar"><div class="budget-bar-fill" style="width:${utilPct}%;background:${fillColor}"></div><div class="budget-bar-pace" style="right:${100-pacePct}%"></div></div>`;
}

function renderChart(c, from, to, sym) {
  // Save state for period toggle re-renders
  perfChartClient = c;
  perfChartFrom   = from;
  perfChartTo     = to;
  perfChartSym    = sym;

  perfChartPeriod = 'daily';
  ['daily','monthly','yearly'].forEach(p => {
    const btn = document.getElementById(`perf-period-${p}`);
    if (!btn) return;
    btn.style.background = p === 'daily' ? '#3b82f6' : 'transparent';
    btn.style.color      = p === 'daily' ? '#fff'    : 'var(--muted2)';
  });
  _drawPerfChart();
}

function setPerfPeriod(period) {
  perfChartPeriod = period;
  ['daily','monthly','yearly'].forEach(p => {
    const btn = document.getElementById(`perf-period-${p}`);
    if (!btn) return;
    btn.style.background = p === period ? '#3b82f6' : 'transparent';
    btn.style.color      = p === period ? '#fff'    : 'var(--muted2)';
  });
  _drawPerfChart();
}

function _aggregateInsights(clientId, from, to, period) {
  const MONTH_HE = ['','ינו','פבר','מרץ','אפר','מאי','יוני','יולי','אוג','ספט','אוק','נוב','דצמ'];
  const map = {};
  allInsights
    .filter(r => r.client_id===clientId && r.date>=from && r.date<=to)
    .forEach(r => {
      let key, label;
      if (period === 'monthly') {
        const [y,m] = r.date.split('-');
        key   = `${y}-${m}`;
        label = `${MONTH_HE[parseInt(m)]} ${y.slice(2)}`;
      } else if (period === 'yearly') {
        key   = r.date.split('-')[0];
        label = key;
      } else {
        key   = r.date;
        const [,m,d] = r.date.split('-');
        label = `${d}/${m}`;
      }
      if (!map[key]) map[key] = { label, spend:0, leads:0, clicks:0, conversion_value:0, conversions:0 };
      map[key].spend            += parseFloat(r.spend||0);
      map[key].leads            += parseInt(r.leads||0) + parseInt(r.conversions||0);
      map[key].clicks           += parseInt(r.clicks||0);
      map[key].conversion_value += parseFloat(r.conversion_value||0);
      map[key].conversions      += parseInt(r.conversions||0);
    });
  const keys = Object.keys(map).sort();
  return { keys, map };
}

function _drawPerfChart() {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  if (!perfChartClient) return;
  const ctx = document.getElementById('perf-chart')?.getContext('2d');
  if (!ctx) return;

  const { keys, map } = _aggregateInsights(perfChartClient.id, perfChartFrom, perfChartTo, perfChartPeriod);
  if (!keys.length) return;

  const sym    = perfChartSym;
  const c      = perfChartClient;
  const isSales = c.goal_type === 'sales';
  const showLeadsInstead = ['קאסה קליניק','שחר אהרוני'].includes(c.business_name);

  const datasets = showLeadsInstead ? [
    { label:'כמות לידים', data:keys.map(k=>map[k].leads||0), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.12)', tension:0.3, fill:true, yAxisID:'y', pointRadius:3, pointHoverRadius:6 },
    { label:goalLabel(c,'cpl')+' ('+sym+')', data:keys.map(k=>map[k].leads>0?(map[k].spend/map[k].leads).toFixed(0):null), borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,0.1)', tension:0.3, fill:false, yAxisID:'y1', spanGaps:true }
  ] : [
    { label:'הוצאה ('+sym+')', data:keys.map(k=>map[k].spend.toFixed(0)), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.1)', tension:0.3, fill:true, yAxisID:'y' },
    { label:goalLabel(c,'cpl')+' ('+sym+')', data:keys.map(k=>map[k].leads>0?(map[k].spend/map[k].leads).toFixed(0):null), borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,0.1)', tension:0.3, fill:false, yAxisID:'y1', spanGaps:true }
  ];
  if (isSales) {
    datasets.push({ label:'ערך מכירות ('+sym+')', data:keys.map(k=>(map[k].conversion_value||0).toFixed(0)), borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.1)', tension:0.3, fill:false, yAxisID:'y', spanGaps:true });
    datasets.push({ label:'כמות מכירות', data:keys.map(k=>(map[k].conversions||0)), borderColor:'#a855f7', backgroundColor:'rgba(168,85,247,0.08)', tension:0.3, fill:false, yAxisID:'yCount', spanGaps:true, borderDash:[5,4], pointRadius:4 });
  }
  const scales = {
    x:{ ticks:{ color:'#64748b' }, grid:{ color:'#1e2d45' } },
    y:{ type:'linear', position:'right', ticks:{ color:'#60a5fa', callback: v => showLeadsInstead ? Math.round(v)+' לידים' : sym+Number(v).toLocaleString('he-IL') }, grid:{ color:'#1e2d45' } },
    y1:{ type:'linear', position:'left', ticks:{ color:'#f59e0b', callback:v=>sym+Number(v).toLocaleString('he-IL') }, grid:{ drawOnChartArea:false } }
  };
  if (isSales) {
    scales.yCount = { type:'linear', position:'left', ticks:{ color:'#a855f7', callback:v=>Math.round(v)+' יח׳' }, grid:{ drawOnChartArea:false } };
  }
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels: keys.map(k => map[k].label), datasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ labels:{ color:'#94a3b8', font:{ family:'Heebo' } } } },
      scales
    }
  });
}

async function renderDaniSales(clientId, from, to, sym) {
  const container = document.getElementById('daily-sales-container');
  if (!container) return;

  container.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">⏳ טוען מכירות...</div>';

  let rows = [];
  try {
    rows = await supaFetch('daily_sales',
      `?client_id=eq.${clientId}&date=gte.${from}&date=lte.${to}&order=date.desc`);
  } catch(e) { console.error(e); }

  if (!rows.length) {
    container.innerHTML = '';
    return;
  }

  const total = rows.reduce((s, r) => s + parseFloat(r.amount || 0), 0);

  const today    = new Date();
  const fmtLabel = (dateStr) => {
    const d    = new Date(dateStr);
    const diff = Math.round((today - d) / 86400000);
    if (diff === 0) return 'היום';
    if (diff === 1) return 'אתמול';
    if (diff === 2) return 'שלשום';
    return `${dateStr.split('-')[2]}/${dateStr.split('-')[1]}`;
  };

  container.innerHTML = `
    <div class="section-title">💰 מכירות יומיות</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:8px">
      ${rows.map(r => `
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${fmtLabel(r.date)}</div>
          <div style="font-size:20px;font-weight:800;color:#10b981">${sym}${parseFloat(r.amount).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>
      `).join('')}
    </div>
    <div style="text-align:left;font-size:12px;color:var(--muted);padding:4px 2px">
      סה"כ תקופה: <strong style="color:#10b981">${sym}${total.toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong>
    </div>
  `;
}

async function renderDuctorsChart(c, from, to, sym) {
  // ── 1. Destroy previous instance ────────────────────────────────────────
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const canvas = document.getElementById('perf-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // ── 2. Source-filter dropdown (inject once, sync value on re-renders) ───
  const filterEl = document.getElementById('ductors-src-filter');
  if (filterEl) {
    if (!filterEl.querySelector('select')) {
      filterEl.innerHTML =
        `<select id="ductors-src-sel"
           style="background:var(--surface2);border:1px solid var(--border);color:var(--text);
                  padding:4px 10px;border-radius:6px;font-family:'Heebo',sans-serif;
                  font-size:12px;cursor:pointer;outline:none;">
           <option value="all">כל המקורות</option>
           <option value="google">Google</option>
           <option value="facebook">Meta</option>
         </select>`;
      const sel = document.getElementById('ductors-src-sel');
      sel.value = ductorsSourceFilter;
      sel.addEventListener('change', function () {
        ductorsSourceFilter = this.value;
        const cl = clients.find(x => x.id === c.id);
        const { from: f, to: t, label: lb } = getDateRange(currentDateMode);
        renderDuctorsChart(cl, f, t, cur(cl));
        renderMasterConversionTable(cl, f, t, cur(cl), lb);
      });
    } else {
      const sel = document.getElementById('ductors-src-sel');
      if (sel) sel.value = ductorsSourceFilter;
    }
  }

  // ── 3. Build Supabase source-filter param ────────────────────────────────
  const srcParam = ductorsSourceFilter === 'google'   ? '&source=eq.Google'
                 : ductorsSourceFilter === 'facebook' ? '&source=eq.Facebook'
                 : '';

  // ── 4. Fetch raw daily rows from leader_summary ──────────────────────────
  //    One row per (date, source) → we aggregate by date below
  let rawRows = [];
  try {
    rawRows = await supaFetch('leader_summary',
      `?select=date,received&client_id=eq.${c.id}&date=gte.${from}&date=lte.${to}${srcParam}&order=date.asc`);
  } catch (e) {
    console.error('[DuctorsChart] fetch error:', e);
  }
  console.log('[DuctorsChart] rawRows:', rawRows?.length, JSON.stringify(rawRows?.slice(0, 4)));

  if (!rawRows || !rawRows.length) {
    canvas.style.display = 'none';
    const wrap = document.getElementById('chart-wrap');
    if (wrap && !wrap.querySelector('.no-data-msg')) {
      const msg = document.createElement('div');
      msg.className = 'no-data-msg';
      msg.style.cssText = 'padding:40px;text-align:center;color:var(--muted);font-family:Heebo,sans-serif;font-size:13px';
      msg.textContent = 'אין נתוני Leader לטווח זה';
      wrap.appendChild(msg);
    }
    return;
  }
  canvas.style.display = '';

  // ── 5. Aggregate received by date (sums all sources when filter = all) ───
  const byDate = {};                              // { 'YYYY-MM-DD': receivedCount }
  for (const row of rawRows) {
    const d = String(row.date || '').trim();
    if (!d) continue;
    byDate[d] = (byDate[d] || 0) + (parseInt(row.received, 10) || 0);
  }

  // ── 6. Build platform spend + leads per day from allInsights ─────────────
  const matchPlat = ductorsSourceFilter === 'google'   ? r => r.platform === 'google'
                  : ductorsSourceFilter === 'facebook' ? r => r.platform === 'facebook'
                  : () => true;
  const insight = {};                             // { 'YYYY-MM-DD': { spend, leads } }
  for (const r of allInsights) {
    if (r.client_id !== c.id)             continue;
    if (r.date < from || r.date > to)     continue;
    if (!matchPlat(r))                    continue;
    if (!insight[r.date]) insight[r.date] = { spend: 0, leads: 0 };
    insight[r.date].spend += parseFloat(r.spend       || 0);
    insight[r.date].leads += parseInt(r.leads         || 0)
                           + parseInt(r.conversions   || 0);
  }

  // ── 7. Sorted date list (leader_summary dates are the source of truth) ───
  const dates = Object.keys(byDate).sort();
  console.log('[DuctorsChart] dates:', dates.length, '| byDate sample:', JSON.stringify(Object.entries(byDate).slice(0, 3)));

  // ── 8. Build the three value arrays ──────────────────────────────────────
  const valReceived = dates.map(d => byDate[d]);

  const valRate = dates.map(d => {
    const platLeads = insight[d]?.leads  || 0;
    const received  = byDate[d]          || 0;
    if (platLeads <= 0 || received <= 0) return null;
    // Cap at 100 — non-platform sources (word-of-mouth, third-party) can push
    // received above platLeads, which would send the line outside the chart area
    return Math.min(100, parseFloat((received / platLeads * 100).toFixed(1)));
  });

  const valCost = dates.map(d => {
    const spend    = insight[d]?.spend || 0;
    const received = byDate[d]         || 0;
    if (received <= 0 || spend <= 0) return null;
    return parseFloat((spend / received).toFixed(0));
  });

  // ── 9. Axis ceilings — each metric on its own scale ─────────────────────
  // Left axis: ONLY leads (small integers, typically 1-20)
  const leadPeak = Math.max(...valReceived, 1);
  const leftMax  = Math.ceil(leadPeak * 1.4);   // e.g. peak=12 → max=17

  // Hidden cost axis: sized to cost values so cost line fills the chart height
  const costPeak = Math.max(...valCost.filter(v => v !== null), 1);
  const costMax  = Math.ceil(costPeak * 1.4);

  // ── 10. X-axis labels DD/MM ───────────────────────────────────────────────
  const xLabels = dates.map(d => {
    const parts = d.split('-');
    return `${parts[2]}/${parts[1]}`;
  });

  // ── 11. Build Chart ───────────────────────────────────────────────────────
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: xLabels,
      datasets: [
        // ── GREEN: לידים שנסגרו (received) · left axis · filled ──────────
        {
          label: 'לידים שנסגרו',
          data: valReceived,
          borderColor: '#10b981',
          backgroundColor: 'rgba(16,185,129,0.12)',
          borderWidth: 2.5,
          cubicInterpolationMode: 'monotone',
          fill: true,
          pointBackgroundColor: '#10b981',
          pointBorderColor: '#0f172a',
          pointBorderWidth: 1,
          pointRadius: 4,
          pointHoverRadius: 7,
          yAxisID: 'yLeft'
        },
        // ── BLUE: אחוז סגירה (%) · right axis · no fill ──────────────────
        {
          label: 'אחוז סגירה (%)',
          data: valRate,
          borderColor: '#3b82f6',
          backgroundColor: 'transparent',
          borderWidth: 2,
          cubicInterpolationMode: 'monotone',
          fill: false,
          spanGaps: true,
          pointBackgroundColor: '#3b82f6',
          pointBorderColor: '#0f172a',
          pointBorderWidth: 1,
          pointRadius: 4,
          pointHoverRadius: 7,
          yAxisID: 'yRight'
        },
        // ── PURPLE: עלות סופית לסגירה (spend/received) · hidden cost axis ──
        {
          label: 'עלות סופית לסגירה (' + sym + ')',
          data: valCost,
          borderColor: '#a78bfa',
          backgroundColor: 'transparent',
          borderWidth: 2,
          cubicInterpolationMode: 'monotone',
          fill: false,
          spanGaps: true,
          pointBackgroundColor: '#a78bfa',
          pointBorderColor: '#0f172a',
          pointBorderWidth: 1,
          pointRadius: 4,
          pointHoverRadius: 7,
          yAxisID: 'yCost'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 22, right: 12, bottom: 4, left: 4 } },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          align: 'end',
          labels: {
            color: '#94a3b8',
            font: { family: 'Heebo', size: 12 },
            usePointStyle: true,
            pointStyleWidth: 10,
            padding: 22
          }
        },
        tooltip: {
          rtl: true,
          bodyFont: { family: 'Heebo' },
          titleFont: { family: 'Heebo' },
          callbacks: {
            label: item => {
              const v = item.parsed.y;
              if (v === null || v === undefined) return null;
              if (item.dataset.yAxisID === 'yRight')
                return ` ${item.dataset.label}: ${v}%`;
              if (item.datasetIndex === 2)
                return ` ${item.dataset.label}: ${sym}${Number(v).toLocaleString('he-IL')}`;
              return ` ${item.dataset.label}: ${v}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#64748b', font: { size: 11 }, maxRotation: 40 },
          grid:  { color: 'rgba(30,45,69,0.9)' }
        },
        // LEFT: ONLY lead counts — small integers, properly scaled (e.g. 0–17)
        yLeft: {
          type: 'linear',
          position: 'left',
          min: 0,
          max: leftMax,
          ticks: {
            color: '#10b981',
            font: { size: 11 },
            precision: 0,
            stepSize: 1,
            callback: v => Number.isInteger(v) ? v : ''
          },
          grid: { color: 'rgba(30,45,69,0.9)' },
          title: {
            display: true,
            text: 'לידים שנסגרו',
            color: '#10b981',
            font: { family: 'Heebo', size: 10 }
          }
        },
        // RIGHT: percentage — isolated, hard 0–100%
        yRight: {
          type: 'linear',
          position: 'right',
          min: 0,
          max: 100,
          ticks: {
            color: '#3b82f6',
            font: { size: 11 },
            callback: v => v + '%'
          },
          grid: { drawOnChartArea: false },
          title: {
            display: true,
            text: '% סגירה',
            color: '#3b82f6',
            font: { family: 'Heebo', size: 10 }
          }
        },
        // COST: hidden right axis — scales cost line without affecting leads scale
        yCost: {
          type: 'linear',
          position: 'right',
          display: false,
          min: 0,
          max: costMax
        }
      }
    }
  });
}

async function renderLeaderTable(c, sym, filterFrom, filterTo, label) {
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT0ItiZNLkWNI3pLY9URnnnzKs880m2o5T3SYIfhbt23iL2ln0T627u8hkyU1wO4CQIRUQ32oyWSbcz/pub?gid=699410654&single=true&output=csv';
  try {
    const res  = await fetch(SHEET_URL);
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1).map(r => {
      const cols = r.split(',');
      return { name:cols[0]||'', phone:cols[1]||'', status:cols[2]||'', campaign:cols[3]||'', date:cols[4]||'' };
    }).filter(r => {
      if (!r.date||!r.date.trim()) return false;
      const parts = r.date.trim().split('/');
      if (parts.length!==3) return false;
      const rowDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
      return rowDate >= filterFrom && rowDate <= filterTo;
    });

    const map = {};
    rows.forEach(r => {
      const camp = r.campaign.trim()||'לא ידוע';
      if (!map[camp]) map[camp] = { leads:0, closed:0 };
      map[camp].leads++;
      if (r.status.trim()==='נסגר') map[camp].closed++;
    });

    const allCamps = campaigns[c.id]||[];
    const spendMap = {};
    allCamps.forEach(camp => { spendMap[camp.campaign_name] = getCampMonthSpend(camp.id); });

    const totalLeads  = Object.values(map).reduce((s,v)=>s+v.leads,0);
    const totalClosed = Object.values(map).reduce((s,v)=>s+v.closed,0);
    const totalSpend  = Object.values(spendMap).reduce((s,v)=>s+v,0);

    const tableRows = Object.entries(map).map(([camp,v]) => {
      const closePct  = v.leads>0?(v.closed/v.leads*100).toFixed(0):0;
      const spend     = spendMap[camp]||0;
      const costClose = v.closed>0?sym+Math.round(spend/v.closed).toLocaleString('he-IL'):'-';
      return `<tr><td>${camp}</td><td>${v.leads}</td><td>${v.closed}</td><td>${closePct}%</td><td>${costClose}</td></tr>`;
    }).join('');

    const totalClosePct  = totalLeads>0?(totalClosed/totalLeads*100).toFixed(0):0;
    const totalCostClose = totalClosed>0?sym+Math.round(totalSpend/totalClosed).toLocaleString('he-IL'):'-';

    const leaderEl = document.getElementById('leader-table-container') || document.createElement('div');
    if (!document.getElementById('leader-table-container')) document.getElementById('main').appendChild(leaderEl);
    leaderEl.innerHTML = `
      <div class="section-title">📋 נתוני Leader - ${label}</div>
      <div class="table-wrap"><table>
        <thead><tr><th>קמפיין</th><th>לידים</th><th>נסגרו</th><th>% סגירה</th><th>עלות סגירה</th></tr></thead>
        <tbody>
          ${tableRows}
          <tr style="background:var(--surface2);font-weight:700;border-top:2px solid var(--border)">
            <td>סה"כ</td><td>${totalLeads}</td><td>${totalClosed}</td><td>${totalClosePct}%</td><td>${totalCostClose}</td>
          </tr>
        </tbody>
      </table></div>`;
  } catch(e) { console.error('Leader fetch error:', e); }
}

async function renderMasterConversionTable(client, from, to, sym, label) {
  const clientId = client.id;
  const masterEl = document.getElementById('master-conv-container');
  if (!masterEl) return;
  const setErr = msg => { masterEl.innerHTML = `<div style="padding:20px;color:var(--muted);text-align:center;font-size:13px">⚠️ ${msg}</div>`; };

  try {
    // ── Source filter ─────────────────────────────────────────────────────
    const srcFilter = ductorsSourceFilter === 'google'   ? '&source=eq.Google'
                    : ductorsSourceFilter === 'facebook' ? '&source=eq.Facebook' : '';
    const activeSources = ductorsSourceFilter === 'google'   ? ['Google']
                        : ductorsSourceFilter === 'facebook' ? ['Facebook']
                        : ['Google','Facebook'];

    // ── Fetch from Supabase leader_summary ────────────────────────────────
    const rows = await supaFetch('leader_summary',
      `?select=source,received,closed,not_relevant,no_answer&client_id=eq.${clientId}&date=gte.${from}&date=lte.${to}${srcFilter}`);

    if (!rows || !Array.isArray(rows)) { setErr('שגיאה בטעינה מ-Supabase'); return; }

    // ── Aggregate by source ───────────────────────────────────────────────
    const map = {
      Google:   { received:0, closed:0, not_relevant:0, no_answer:0 },
      Facebook: { received:0, closed:0, not_relevant:0, no_answer:0 }
    };
    rows.forEach(r => {
      const src = r.source === 'Facebook' ? 'Facebook' : r.source === 'Google' ? 'Google' : null;
      if (!src) return;
      map[src].received     += r.received     || 0;
      map[src].closed       += r.closed       || 0;
      map[src].not_relevant += r.not_relevant || 0;
      map[src].no_answer    += r.no_answer    || 0;
    });

    // ── daily_insights aggregation (filtered by platform if needed) ───────
    const inRange  = r => r.client_id === clientId && r.date >= from && r.date <= to;
    const platFilter = ductorsSourceFilter === 'google'   ? r => r.platform==='google'
                     : ductorsSourceFilter === 'facebook' ? r => r.platform==='facebook'
                     : () => true;
    const platData = {
      Google: allInsights.filter(r => inRange(r) && r.platform === 'google').reduce(
        (a, r) => ({ spend: a.spend + parseFloat(r.spend||0), leads: a.leads + parseInt(r.leads||0) + parseInt(r.conversions||0) }),
        { spend:0, leads:0 }
      ),
      Facebook: allInsights.filter(r => inRange(r) && r.platform === 'facebook').reduce(
        (a, r) => ({ spend: a.spend + parseFloat(r.spend||0), leads: a.leads + parseInt(r.leads||0) + parseInt(r.conversions||0) }),
        { spend:0, leads:0 }
      )
    };

    // ── Formatters ────────────────────────────────────────────────────────
    const fmtMoney = v => v > 0 ? sym + Math.round(v).toLocaleString('he-IL') : '-';
    // NEW: closing rate = לידים שנסגרו (received from Leader) / לידים שנכנסו (platform leads)
    const fmtRate  = (leaderLeads, platLeads) =>
      platLeads > 0 && leaderLeads > 0 ? (leaderLeads / platLeads * 100).toFixed(1) + '%' : '-';
    // Cost per actual lead (spend / received from Leader)
    const fmtClose = (sp, rec) => rec > 0 && sp > 0 ? sym + Math.round(sp / rec) : '-';
    const fmtSt    = (nr,na) => {
      const p = [];
      if (na > 0) p.push('אין מענה: ' + na);
      if (nr > 0) p.push('לא רלוונטי: ' + nr);
      return p.length ? p.join(' | ') : '-';
    };

    const CLR     = { Google:'#ef4444', Facebook:'#3b82f6' };
    const DISPLAY = { Google:'Google',  Facebook:'Meta' };

    const tableRows = activeSources.map(src => {
      const d  = map[src];
      const pd = platData[src];
      return `<tr>
        <td style="font-weight:700"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${CLR[src]};margin-left:6px;vertical-align:middle"></span>${DISPLAY[src]}</td>
        <td style="text-align:center;color:var(--accent2);font-weight:700">${fmtMoney(pd.spend)}</td>
        <td style="text-align:center;font-weight:700;color:var(--blue,#60a5fa)">${d.received > 0 ? d.received : '-'}</td>
        <td style="text-align:center;color:var(--green)">${d.closed > 0 ? d.closed : '-'}</td>
        <td style="text-align:center;color:var(--green)">${d.received > 0 && d.closed > 0 ? (d.closed/d.received*100).toFixed(1)+'%' : '-'}</td>
        <td style="text-align:center;font-size:11px;color:var(--muted2)">${fmtSt(d.not_relevant, d.no_answer)}</td>
        <td style="text-align:center;color:var(--yellow);font-weight:700">${fmtClose(pd.spend, d.received)}</td>
      </tr>`;
    }).join('');

    // Totals (only over active sources)
    const tot = activeSources.reduce((acc, src) => ({
      spend:    acc.spend    + (platData[src].spend  || 0),
      platLeads:acc.platLeads+ (platData[src].leads  || 0),
      received: acc.received + (map[src].received    || 0),
      closed:   acc.closed   + (map[src].closed      || 0),
      nr:       acc.nr       + (map[src].not_relevant|| 0),
      na:       acc.na       + (map[src].no_answer   || 0)

let _makorFrom = '';
let _makorTo   = '';

async function loadNewCustomersInline(clientId, from, to) {
  // שמור from/to לשימוש ב-renderMakorMonthlyChart
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  _makorFrom = from || `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
  _makorTo   = to   || todayStr;

  const valEl      = document.getElementById('new-customers-val');
  const lastValEl  = document.getElementById('last-month-customers-val');
  const progressEl = document.getElementById('customers-progress');
  const yestValEl  = document.getElementById('new-customers-yesterday-val');
  const yestRevEl  = document.getElementById('new-customers-yesterday-rev');
  if (!valEl) return;
  const currDate = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
  const lm = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastDate = `${lm.getFullYear()}-${pad(lm.getMonth()+1)}-01`;
  const yest = new Date(now); yest.setDate(yest.getDate()-1);
  const yestDate = `${yest.getFullYear()}-${pad(yest.getMonth()+1)}-${pad(yest.getDate())}`;

  try {
    const [currRows, lastRows, yestRows] = await Promise.all([
      supaFetch('new_customers', `?client_id=eq.${clientId}&date=eq.${currDate}&select=count`),
      supaFetch('new_customers', `?client_id=eq.${clientId}&date=eq.${lastDate}&select=count`),
      supaFetch('new_customers', `?client_id=eq.${clientId}&date=eq.${yestDate}&select=count,revenue`)
    ]);
    const currCount = currRows?.[0]?.count ? Number(currRows[0].count) : 0;
    const lastCount = lastRows?.[0]?.count ? Number(lastRows[0].count) : 0;
    const yestCount = yestRows?.[0]?.count ? Number(yestRows[0].count) : 0;
    const yestRev   = yestRows?.[0]?.revenue ? Number(yestRows[0].revenue) : 0;

    valEl.textContent = String(currCount);
    if (lastValEl) lastValEl.textContent = String(lastCount);
    if (yestValEl) yestValEl.textContent = yestCount > 0 ? String(yestCount) : '0';
    if (yestRevEl) yestRevEl.textContent = yestRev > 0 ? '₪' + Math.round(yestRev).toLocaleString('he-IL') : '—';

    if (progressEl) {
      if (lastCount > 0) {
        const pct = Math.round((currCount / lastCount) * 100);
        const color = pct >= 100 ? 'var(--green)' : pct >= 70 ? 'var(--yellow)' : 'var(--red)';
        progressEl.innerHTML = `התקדמות: <span style="color:${color};font-weight:700">${pct}%</span> לעומת חודש שעבר`;
      } else {
        progressEl.textContent = '';
      }
    }
  } catch(e) {
    console.warn('new_customers fetch failed:', e?.message || e);
    valEl.textContent = '-';
  }
  await renderMakorMonthlyChart(clientId, _makorFrom, _makorTo);
}

let makorNcChart = null;

let makorChartFilter = 'new'; // 'new' | 'existing' | 'all'
let makorChartRows       = null;  // monthly rows (YYYY-MM-01)
let makorChartDailyRows  = null;  // daily rows
let makorChartClientId   = null;
let makorChartPeriod     = 'monthly'; // 'daily' | 'monthly'

function setMakorFilter(filter) {
  makorChartFilter = filter;
  const colors = { new: '#10b981', existing: '#f59e0b', all: '#6366f1' };
  ['new','existing','all'].forEach(k => {
    const btn = document.getElementById('makor-filter-' + k);
    if (!btn) return;
    btn.style.background = filter === k ? colors[k] : 'transparent';
    btn.style.color      = filter === k ? '#fff' : 'var(--muted2)';
  });
  const titles = { new:'לקוחות חדשים', existing:'לקוחות קיימים', all:'כלל הלקוחות' };
  const titleEl = document.getElementById('makor-chart-title');
  if (titleEl) titleEl.textContent = titles[filter];
  _drawMakorByPeriod();
}

function setMakorPeriod(period) {
  makorChartPeriod = period;
  ['daily','monthly'].forEach(p => {
    const btn = document.getElementById(`makor-period-${p}`);
    if (!btn) return;
    btn.style.background = p === period ? '#10b981' : 'transparent';
    btn.style.color      = p === period ? '#fff'    : 'var(--muted2)';
  });
  _drawMakorByPeriod();
}

function _drawMakorByPeriod() {
  if (makorChartPeriod === 'daily' && makorChartDailyRows?.length) {
    drawMakorChart(makorChartDailyRows, 'daily');
  } else if (makorChartRows?.length) {
    drawMakorChart(makorChartRows, 'monthly');
  }
}

function updateMakorKpis(rows) {
  if (!rows?.length) return;
  // Use last complete month (second to last, as last is current partial month)
  const ref = rows.length >= 2 ? rows[rows.length - 2] : rows[rows.length - 1];
  let val1, val2, label1;
  if (makorChartFilter === 'new') {
    val1   = (ref.count || 0).toLocaleString();
    val2   = '₪' + Math.round(ref.revenue || 0).toLocaleString();
    label1 = 'לקוחות חדשים';
  } else if (makorChartFilter === 'existing') {
    val1   = (ref.existing_orders || 0).toLocaleString();
    val2   = '₪' + Math.round(ref.existing_revenue || 0).toLocaleString();
    label1 = 'הזמנות קיימים';
  } else {
    val1   = (ref.total_orders || 0).toLocaleString();
    val2   = '₪' + Math.round(ref.total_revenue || 0).toLocaleString();
    label1 = 'סה"כ הזמנות';
  }
  const totalOrders = makorChartFilter === 'new'
    ? (ref.count || 0)
    : makorChartFilter === 'existing'
      ? (ref.existing_orders || 0)
      : (ref.total_orders || 0);
  const totalRev = makorChartFilter === 'new'
    ? (ref.revenue || 0)
    : makorChartFilter === 'existing'
      ? (ref.existing_revenue || 0)
      : (ref.total_revenue || 0);
  const avg = totalOrders > 0 ? Math.round(totalRev / totalOrders) : 0;

  const el1 = document.getElementById('makor-kpi-label-1');
  const ev1 = document.getElementById('makor-kpi-val-1');
  const ev2 = document.getElementById('makor-kpi-val-2');
  const ev3 = document.getElementById('makor-kpi-val-3');
  if (el1) el1.textContent = label1 + ' (חודש שעבר)';
  if (ev1) ev1.textContent = val1;
  if (ev2) ev2.textContent = val2;
  if (ev3) ev3.textContent = '₪' + avg.toLocaleString();
}

function drawMakorChart(rows, periodOverride) {
  updateMakorKpis(rows);
  const period = periodOverride || makorChartPeriod;

  const HEB_MONTHS = ['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];
  const labels = rows.map(r => {
    const [y,m,d] = r.date.split('-');
    if (period === 'daily') return `${d}/${m}`;
    return HEB_MONTHS[parseInt(m)-1] + " '" + y.slice(2);
  });

  const isLast = i => i === rows.length - 1;
  const cfg = {
    new:      { counts: rows.map(r=>r.count||0),           revenues: rows.map(r=>r.revenue||0),          barC:'#10b981', barCA:'rgba(16,185,129,', lineC:'#34d399', countLabel:'לקוחות חדשים'  },
    existing: { counts: rows.map(r=>r.existing_orders||0), revenues: rows.map(r=>r.existing_revenue||0), barC:'#f59e0b', barCA:'rgba(245,158,11,',  lineC:'#fbbf24', countLabel:'הזמנות קיימים' },
    all:      { counts: rows.map(r=>r.total_orders||0),    revenues: rows.map(r=>r.total_revenue||0),    barC:'#6366f1', barCA:'rgba(99,102,241,',  lineC:'#818cf8', countLabel:'סה"כ הזמנות'   }
  }[makorChartFilter];

  const { counts, revenues, barC, barCA, lineC, countLabel } = cfg;

  const ctx = document.getElementById('makor-nc-chart')?.getContext('2d');
  if (!ctx) return;
  if (makorNcChart) { makorNcChart.destroy(); makorNcChart = null; }

  // Gradient for bars
  const barColors = counts.map((_, i) => isLast(i) ? 'rgba(148,163,184,0.25)' : barCA + '0.75)');
  const barBorders = counts.map((_, i) => isLast(i) ? 'rgba(148,163,184,0.5)' : barC);

  makorNcChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: countLabel,
          data: counts,
          backgroundColor: barColors,

        },
        {
          label: 'שווי הזמנות (₪)',
          data: revenues,
          type: 'line',
          borderColor: lineC,
          backgroundColor: 'transparent',
          pointBackgroundColor: revenues.map((_, i) => isLast(i) ? 'rgba(148,163,184,0.6)' : lineC),
          pointBorderColor: '#1e293b',
          pointBorderWidth: 2,
          pointRadius: 5,
          pointHoverRadius: 7,
          tension: 0.4,
          fill: false,
          borderWidth: 2.5,
          yAxisID: 'yRevenue',
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          position: 'bottom',
          labels: {
            color: '#64748b',
            font: { family:'Heebo', size:11 },
            boxWidth: 10, boxHeight: 10,
            padding: 16,
            usePointStyle: true
          }
        },
        tooltip: {

          padding: 12,

  });

async function renderMakorMonthlyChart(clientId, from, to) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const rangeFrom = from || `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
  const rangeTo   = to   || todayStr;

  // שולפים כל הנתונים — מסננים בצד לקוח
  const allRows = await supaFetch('new_customers',
    `?client_id=eq.${clientId}&order=date.desc&limit=120&select=date,count,revenue,total_orders,total_revenue,existing_orders,existing_revenue`);
  if (!allRows?.length) return;

  // ── חודשי: רק ראשי חודש, 6 חודשים אחרונים ────────────────
  const monthlyRows = allRows.filter(r => r.date && r.date.endsWith('-01')).slice(0, 6);
  monthlyRows.reverse();

  // ── יומי: כל הרשומות הלא-חודשיות בטווח ──────────────────
  const dailyMap = {};
  allRows
    .filter(r => r.date && !r.date.endsWith('-01') && r.date >= rangeFrom && r.date <= rangeTo)
    .forEach(r => { dailyMap[r.date] = r; });

  // מלא ימים חסרים ב-0 בכל הטווח
  const cur = new Date(rangeFrom);
  const end = new Date(rangeTo);
  while (cur <= end) {
    const key = `${cur.getFullYear()}-${pad(cur.getMonth()+1)}-${pad(cur.getDate())}`;
    if (!dailyMap[key]) {
      dailyMap[key] = { date: key, count: 0, revenue: 0, total_orders: 0, total_revenue: 0, existing_orders: 0, existing_revenue: 0 };
    }
    cur.setDate(cur.getDate() + 1);
  }
  const dailyRows = Object.values(dailyMap).sort((a,b) => a.date.localeCompare(b.date));

  makorChartRows      = monthlyRows;
  makorChartDailyRows = dailyRows;
  makorChartClientId  = clientId;

  // ברירת מחדל: חודשי
  makorChartPeriod = 'monthly';
  ['daily','monthly'].forEach(p => {
    const btn = document.getElementById(`makor-period-${p}`);
    if (!btn) return;
    btn.style.background = p === 'monthly' ? '#10b981' : 'transparent';
    btn.style.color      = p === 'monthly' ? '#fff'    : 'var(--muted2)';
  });

  _drawMakorByPeriod();
}

async function saveNewCustomersInline(clientId) {
  const input = document.getElementById('new-customers-input');

  const now = new Date();
  const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;

  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/new_customers`, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${SUPA_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=representation'
      },
      body: JSON.stringify({ client_id: clientId, date, count: Math.floor(val) })

  // ── Render HTML ───────────────────────────────────────────
  container.innerHTML = `

      </div>
      <div class="kpi-card">
        <div class="kpi-label">לקוחות חדשים — חודש שעבר</div>
        <div class="kpi-val" style="color:var(--muted2)">${prevCount.toLocaleString('he-IL')}</div>
        <div class="kpi-sub">${prevFrom.substring(0,7)} (חודש שלם)</div>
      </div>

function setAsifPeriod(period) {

      btn.style.background = '#10b981'; btn.style.color = '#fff';

      btn.style.background = 'transparent'; btn.style.color = 'var(--muted2)';
    }
  });
  const labels = { daily:'ליום', monthly:'לחודש', yearly:'לשנה' };
  const lbl = document.getElementById('asif-chart-period-label');
  if (lbl) lbl.textContent = `📈 לקוחות חדשים וערך הזמנות ${labels[period]}`;
  drawAsifTimeSeries();
}

function drawAsifTimeSeries() {
  if (asifChart1) { asifChart1.destroy(); asifChart1 = null; }
  const canvas = document.getElementById('asif-chart-daily');
  if (!canvas || !asifAllRows || !asifAllRows.length) return;

  const sym = asifChartSym;
  const period = asifChartPeriod;

  // ── הפילטר העליון תמיד מנחה — סינון לפי טווח תאריכים בכל מצב ──
  const sourceRows = asifAllRows.filter(r => r.date >= asifChartFrom && r.date <= asifChartTo);

  // ── Aggregate rows by period ──────────────────────────────
  const bucketMap = {};
  for (const r of sourceRows) {
    const d = r.date;
    let key;
    if (period === 'daily')        key = d;
    else if (period === 'monthly') key = d.substring(0, 7);
    else                           key = d.substring(0, 4);
    if (!bucketMap[key]) bucketMap[key] = { count: 0, value: 0 };
    bucketMap[key].count += parseInt(r.count || 0);
    bucketMap[key].value += parseFloat(r.total_value || 0);
  }

  // ── במצב יומי — ממלא ימים חסרים בטווח עם 0 ────────────────
  if (period === 'daily' && asifChartFrom && asifChartTo) {
    const cur = new Date(asifChartFrom);
    const end = new Date(asifChartTo);
    while (cur <= end) {
      const key = cur.toISOString().split('T')[0];
      if (!bucketMap[key]) bucketMap[key] = { count: 0, value: 0 };
      cur.setDate(cur.getDate() + 1);
    }
  }

  const keys = Object.keys(bucketMap).sort();

  // ── Format X-axis labels ──────────────────────────────────
  const xLabels = keys.map(k => {
    if (period === 'daily') {
      const [,m,dy] = k.split('-'); return `${dy}/${m}`;
    } else if (period === 'monthly') {
      const [y,m] = k.split('-');
      const monthNames = ['','ינו','פבר','מרץ','אפר','מאי','יוני','יולי','אוג','ספט','אוק','נוב','דצמ'];
      return `${monthNames[parseInt(m)]} ${y.slice(2)}`;
    }
    return k; // year
  });

  const counts = keys.map(k => bucketMap[k].count);
  const values = keys.map(k => Math.round(bucketMap[k].value));

  asifChart1 = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: xLabels,
      datasets: [
        {
          label: 'לקוחות חדשים',
          data: counts,
          borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.10)',
          borderWidth: 2.5, tension: 0.4, fill: true,
          pointBackgroundColor: '#10b981', pointBorderColor: '#1e293b', pointBorderWidth: 1.5,
          pointRadius: period === 'yearly' ? 6 : 4, pointHoverRadius: 7,
          yAxisID: 'yCount', order: 2
        },
        {
          label: 'ערך הזמנות (₪)',
          data: values,
          borderColor: '#3b82f6', backgroundColor: 'transparent',
          borderWidth: 2.5, tension: 0.4, fill: false,
          pointBackgroundColor: '#3b82f6', pointBorderColor: '#1e293b', pointBorderWidth: 1.5,
          pointRadius: period === 'yearly' ? 6 : 4, pointHoverRadius: 7,
          yAxisID: 'yValue', order: 1
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true, position: 'bottom',
          labels: { color:'#64748b', font:{family:'Heebo',size:11}, boxWidth:10, boxHeight:10, padding:16, usePointStyle:true }
        },
        tooltip: {
          backgroundColor: '#1e293b', borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1,
          padding: 12, titleColor:'#94a3b8', bodyColor:'#f1f5f9',
          titleFont:{family:'Heebo',size:11}, bodyFont:{family:'Heebo',size:13,weight:'600'},
          callbacks: {
            label: i => i.dataset.yAxisID === 'yValue'
              ? '  💰 ' + sym + Math.round(i.parsed.y).toLocaleString('he-IL')
              : '  👤 ' + i.parsed.y + ' לקוחות'
          }
        }
      },
      scales: {
        x: { ticks:{color:'#64748b',font:{family:'Heebo',size:10}}, grid:{color:'rgba(255,255,255,0.04)'}, border:{display:false} },
        yCount: {
          position: 'right', beginAtZero: true,
          ticks: { color:'#10b981', font:{family:'Heebo',size:10}, stepSize:1, maxTicksLimit:6 },
          grid: { color:'rgba(255,255,255,0.04)' }, border:{display:false}
        },
        yValue: {
          position: 'left', beginAtZero: true,
          ticks: { color:'#3b82f6', font:{family:'Heebo',size:10}, maxTicksLimit:6,
            callback: v => sym + (v>=1000 ? Math.round(v/1000)+'K' : v) },
          grid: { display:false }, border:{display:false}
        }
      }
    }
  });
}

function clarityAddMsg(clientId, text, cls) {

async function claritySendText(clientId, text) {
  if (clarityLoading[clientId]) return;
  clarityLoading[clientId] = true;

  const sendBtn = document.querySelector(`#clarity-input-row-${clientId} .clarity-send-btn`);
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = '...'; }

  clarityAddMsg(clientId, text, 'user');
  clarityAddMsg(clientId, '⏳ חושב...', 'bot loading');

  try {
    const history = clarityHistory[clientId] || [];
    const res  = await fetch('http://localhost:3001/clarity-chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ clientId, message: text, history })
    });
    const data = await res.json();

    if (data.error) {
      clarityAddMsg(clientId, `❌ ${data.error}`, 'bot');
    } else {
      // Update history
      clarityHistory[clientId] = [
        ...history,
        { role: 'user',      content: text },
        { role: 'assistant', content: data.reply }
      ];
      // Keep history max 10 turns to avoid token bloat
      if (clarityHistory[clientId].length > 20)
        clarityHistory[clientId] = clarityHistory[clientId].slice(-20);

      clarityAddMsg(clientId, data.reply, 'bot');
    }
  } catch(e) {
    clarityAddMsg(clientId, '❌ שגיאת תקשורת עם השרת.', 'bot');
  } finally {
    clarityLoading[clientId] = false;
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = 'שלח ›'; }
  }
}

function caScoreColor(score) {
  return score >= 75 ? '#10b981' : score >= 50 ? '#f59e0b' : '#ef4444';
}

function caScoreLabel(score) {
  return score >= 75 ? 'טוב' : score >= 50 ? 'בינוני' : 'נמוך';
}

function caGaugeSVG(score, size = 90) {
  const color  = caScoreColor(score);
  const r      = size * 0.4;
  const cx     = size / 2;
  const cy     = size / 2;
  const circ   = 2 * Math.PI * r;
  const fill   = (score / 100) * circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e2d45" stroke-width="8"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="8"
      stroke-dasharray="${fill.toFixed(1)} ${(circ - fill).toFixed(1)}"
      stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy - 4}" text-anchor="middle" dominant-baseline="middle"
      fill="${color}" font-size="${size * 0.22}" font-weight="800" font-family="Heebo">${score}</text>
    <text x="${cx}" y="${cy + size * 0.16}" text-anchor="middle"
      fill="#64748b" font-size="${size * 0.1}" font-family="Heebo">/100</text>
  </svg>`;
}

function caHistoryMiniChart(history) {
  if (!history || !history.length) return '<div style="color:var(--muted);font-size:12px;padding:12px 0">אין היסטוריה עדיין — מחר בבוקר ייוצר הסנפשוט הראשון אוטומטית</div>';
  const ordered = [...history].reverse();
  const maxS    = Math.max(...ordered.map(h => h.sessions || 0), 1);

  // Trend arrow
  let trendHtml = '';
  if (ordered.length >= 2) {
    const first = ordered[0].sessions || 0;
    const last  = ordered[ordered.length - 1].sessions || 0;
    const diff  = last - first;
    const pct   = first > 0 ? Math.round((diff / first) * 100) : 0;
    const arrow = diff >= 0 ? '↑' : '↓';
    const col   = diff >= 0 ? '#10b981' : '#ef4444';
    trendHtml = `<div style="font-size:12px;color:${col};margin-bottom:8px;font-weight:700">${arrow} ${Math.abs(pct)}% לעומת ${ordered.length} ימים קודם</div>`;
  }

  return trendHtml + `<div class="ca-history-chart">
    ${ordered.map(h => {
      const pct   = Math.round(((h.sessions || 0) / maxS) * 100);
      const color = caScoreColor(h.health_score || 0);
      const d     = new Date(h.date);
      const lbl   = `${d.getDate()}/${d.getMonth() + 1}`;
      return `<div class="ca-history-bar-wrap" title="ציון: ${h.health_score} | סשנים: ${h.sessions}">
        <div class="ca-history-val" style="color:${color}">${h.health_score ?? '—'}</div>
        <div class="ca-history-bar" style="height:${Math.max(pct * 0.48, 4)}px;background:${color};opacity:0.75"></div>
        <div class="ca-history-date">${lbl}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function caCitiesSection(history) {
  // Collect cities from all snapshots (today's = first entry)
  if (!history || !history.length) return '';
  const latest = history[0];
  let cities = [];
  try {
    cities = typeof latest.top_cities === 'string'
      ? JSON.parse(latest.top_cities)
      : (latest.top_cities || []);
  } catch(e) { return ''; }
  if (!cities.length) return '';

  const maxN  = Math.max(...cities.map(c => c.סשנים || 0), 1);
  const rows  = cities.slice(0, 10).map(c => {
    const pct = Math.round(((c.סשנים || 0) / maxN) * 100);
    return `<div class="ca-breakdown-row">
      <div class="ca-breakdown-lbl">📍 ${c.עיר || 'לא ידוע'}</div>
      <div class="ca-breakdown-bar-bg"><div class="ca-breakdown-bar-fill" style="width:${pct}%;background:#6366f1"></div></div>
      <div class="ca-breakdown-n">${c.סשנים}</div>
    </div>`;
  }).join('');

  return `<div class="ca-breakdown">
    <div class="ca-breakdown-title">📍 ערים מובילות (3 ימים)</div>
    ${rows}
  </div>`;
}

async function caSaveSnapshot(clientId, name, btn) {
  btn.disabled = true;
  btn.textContent = '⏳';
  try {
    const r = await fetch(`http://localhost:3001/clarity-snapshot/${clientId}`, { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = '✅';
      showToast(`✅ ${name} — ציון ${d.score} נשמר`);
    } else {
      btn.textContent = '❌';
      showToast(`❌ ${d.error}`);
    }
  } catch(e) {
    btn.textContent = '❌';
  }
  setTimeout(() => { if(btn) { btn.disabled = false; btn.textContent = '💾 שמור'; } }, 3000);
}

async function caAnalyzeAll(btn) {
  btn.disabled = true;
  btn.textContent = '⏳ שומר סנפשוטים...';
  const cards = document.querySelectorAll('.ca-card:not(.ca-error)');
  let saved = 0;
  for (const card of cards) {
    const saveBtn = card.querySelector('.ca-btn.secondary');
    if (saveBtn) {
      saveBtn.click();
      await new Promise(r => setTimeout(r, 600));
      saved++;
    }
  }
  btn.disabled = false;
  btn.textContent = `✅ ${saved} לקוחות נשמרו`;
  setTimeout(() => { btn.textContent = '⚡ נתח הכל'; }, 3000);
}
